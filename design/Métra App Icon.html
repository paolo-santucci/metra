<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Métra — App Icon</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail" data-bg-color="#E2D9C8">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#E2D9C8"/>
    <rect x="10" y="10" width="35" height="35" rx="8" fill="#1A1410"/>
    <circle cx="27" cy="27" r="10" fill="#EDE4D3"/>
    <circle cx="32" cy="23" r="8" fill="#1A1410"/>
    <line x1="17" y1="37" x2="37" y2="37" stroke="#C87456" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="55" y="10" width="35" height="35" rx="8" fill="#F4EDE2"/>
    <circle cx="72" cy="27" r="10" fill="#2B2521"/>
    <circle cx="77" cy="23" r="8" fill="#F4EDE2"/>
    <line x1="62" y1="37" x2="82" y2="37" stroke="#C87456" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</template>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #E2D9C8; font-family: 'Inter', sans-serif; padding: 56px 48px 80px; }
h1 { font-family: 'DM Serif Display', serif; font-size: 22px; color: #2B2521; margin-bottom: 6px; }
.sub { font-size: 12px; color: rgba(43,37,33,0.45); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 56px; }
.section { margin-bottom: 56px; }
.label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: rgba(43,37,33,0.38); margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid rgba(43,37,33,0.1); }
.row { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 9px; }
.sz { font-size: 10px; color: rgba(43,37,33,0.38); }
.variants-row { display: flex; gap: 48px; flex-wrap: wrap; align-items: flex-start; }
.variant-block { display: flex; flex-direction: column; gap: 16px; }
.variant-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: #2B2521; }
.variant-desc { font-size: 12px; color: rgba(43,37,33,0.5); line-height: 1.6; max-width: 260px; }
.sizes-row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
.dark-strip { background: #1A1410; border-radius: 16px; padding: 24px 28px; display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
.dark-strip .sz { color: rgba(237,228,211,0.3); }
.light-strip { background: #F4EDE2; border-radius: 16px; padding: 24px 28px; display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; border: 1px solid rgba(43,37,33,0.08); }
.android-row { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; }
</style>
</head>
<body>

<h1>Métra — App Icon</h1>
<p class="sub">Light + Dark · iOS · Android · Tutte le misure</p>

<!--
  Due varianti SVG — stessa composizione, palette invertita.
  La falce è costruita con clip-path per evitare il problema
  del cerchio-cancellazione che appare su sfondi diversi dal BG.
-->

<div id="root"></div>

<script>
/* ─── SVG BUILDER ────────────────────────────────────────────────
   Parametri:
   - size: px lato
   - bg: colore sfondo
   - moonFill: colore disco lunare
   - bite: colore "morsa" (= bg, nascosto dall'identicalità col fondo)
   - macron: colore linea macron
   - radiusPct: border-radius come % del lato (iOS 22.37%)

   Tecnica falce: mask SVG (rettangolo bianco pieno + cerchio nero offset)
   → nessun artefatto a prescindere dal colore di sfondo del documento.
──────────────────────────────────────────────────────────────── */
let _uid = 0;
function makeIconSVG(size, { bg, moonFill, macron, radiusPct = 0.2237, glowColor }) {
  const id = ++_uid;
  const r = Math.round(size * radiusPct);
  const k = size / 100; // scala

  // geometria normalizzata su 100×100
  const moonCx = 50, moonCy = 44, moonR = 22;
  const biteCx = 59, biteCy = 39, biteR = 18;

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.style.cssText = `display:block;border-radius:${r}px;flex-shrink:0;`;

  svg.innerHTML = `
    <defs>
      <radialGradient id="bg${id}" cx="50%" cy="46%" r="62%">
        <stop offset="0%" stop-color="${glowColor || bg}"/>
        <stop offset="100%" stop-color="${bg}"/>
      </radialGradient>
      <radialGradient id="glow${id}" cx="50%" cy="44%" r="40%">
        <stop offset="0%" stop-color="${macron}" stop-opacity=".14"/>
        <stop offset="100%" stop-color="${macron}" stop-opacity="0"/>
      </radialGradient>
      <!-- Mask per la falce: rettangolo bianco (visibile) meno cerchio nero (trasparente) -->
      <mask id="crescent${id}">
        <rect width="100" height="100" fill="white"/>
        <circle cx="${biteCx}" cy="${biteCy}" r="${biteR}" fill="black"/>
      </mask>
    </defs>

    <!-- Sfondo -->
    <rect width="100" height="100" fill="url(#bg${id})"/>

    <!-- Alone caldo -->
    <circle cx="${moonCx}" cy="${moonCy}" r="34" fill="url(#glow${id})"/>

    <!-- Falce lunare — cerchio pieno con mask che sottrae il morso -->
    <circle cx="${moonCx}" cy="${moonCy}" r="${moonR}"
      fill="${moonFill}" mask="url(#crescent${id})"/>

    <!-- Bordo sottile sulla falce — profondità -->
    <circle cx="${moonCx}" cy="${moonCy}" r="${moonR}"
      fill="none" stroke="${moonFill}" stroke-width=".6" opacity=".2"
      mask="url(#crescent${id})"/>

    <!-- Macron -->
    <line x1="36" y1="74" x2="64" y2="74"
      stroke="${macron}" stroke-width="3.2" stroke-linecap="round"/>

    <!-- Tre punti fase -->
    <circle cx="43" cy="81" r="1.4" fill="${macron}" fill-opacity=".4"/>
    <circle cx="50" cy="81" r="1.4" fill="${macron}" fill-opacity=".65"/>
    <circle cx="57" cy="81" r="1.4" fill="${macron}" fill-opacity=".4"/>
  `;
  return svg;
}

const DARK = { bg: '#1A1410', glowColor: '#312420', moonFill: '#EDE4D3', macron: '#C87456' };
const LIGHT = { bg: '#F4EDE2', glowColor: '#E8DFCE', moonFill: '#2B2521', macron: '#C87456' };

function cell(size, label, params, radiusPct) {
  const wrap = document.createElement('div');
  wrap.className = 'cell';
  const icon = makeIconSVG(size, { ...params, radiusPct: radiusPct ?? 0.2237 });
  if (size >= 60) icon.style.boxShadow = '0 4px 20px rgba(43,37,33,.22)';
  wrap.appendChild(icon);
  const sz = document.createElement('span');
  sz.className = 'sz';
  sz.textContent = label || `${size}×${size}`;
  wrap.appendChild(sz);
  return wrap;
}

function androidCell(size, label, params, maskCSS) {
  const wrap = document.createElement('div');
  wrap.className = 'cell';
  const clip = document.createElement('div');
  clip.style.cssText = `width:${size}px;height:${size}px;${maskCSS};overflow:hidden;box-shadow:0 4px 16px rgba(43,37,33,.2);flex-shrink:0;`;
  const icon = makeIconSVG(size, { ...params, radiusPct: 0 });
  icon.style.borderRadius = '0';
  clip.appendChild(icon);
  const sz = document.createElement('span');
  sz.className = 'sz';
  sz.textContent = label;
  wrap.appendChild(clip);
  wrap.appendChild(sz);
  return wrap;
}

const root = document.getElementById('root');

/* ── HERO: due varianti affiancate ── */
const heroSec = document.createElement('div');
heroSec.className = 'section';
heroSec.innerHTML = '<div class="label">Due varianti · Light & Dark</div>';
const varRow = document.createElement('div');
varRow.className = 'variants-row';

function variantBlock(title, desc, params, strip) {
  const block = document.createElement('div');
  block.className = 'variant-block';
  block.innerHTML = `<div class="variant-title">${title}</div><div class="variant-desc">${desc}</div>`;
  const heroIcon = makeIconSVG(280, params);
  heroIcon.style.borderRadius = Math.round(280 * 0.2237) + 'px';
  heroIcon.style.boxShadow = '0 12px 48px rgba(43,37,33,.28)';
  block.appendChild(heroIcon);

  // strip misure
  const s = document.createElement('div');
  s.className = strip;
  for (const sz of [120, 60, 40, 29]) {
    const c = cell(sz, `${sz}px`, params);
    s.appendChild(c);
  }
  block.appendChild(s);

  const tokens = document.createElement('div');
  tokens.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-top:4px;';
  const t = params === DARK
    ? [['#1A1410','Notte fonda · sfondo'],['#EDE4D3','Avorio · luna'],['#C87456','Terracotta · macron']]
    : [['#F4EDE2','Sabbia · sfondo'],['#2B2521','Inchiostro · luna'],['#C87456','Terracotta · macron']];
  t.forEach(([hex, role]) => {
    tokens.innerHTML += `<div style="display:flex;align-items:center;gap:8px;">
      <div style="width:14px;height:14px;border-radius:3px;background:${hex};border:1px solid rgba(43,37,33,.12);flex-shrink:0;"></div>
      <span style="font-size:11px;color:rgba(43,37,33,.55);">${hex} — ${role}</span>
    </div>`;
  });
  block.appendChild(tokens);
  return block;
}

varRow.appendChild(variantBlock('Dark', 'Tema scuro — fondo Notte, luna Avorio.', DARK, 'dark-strip'));
varRow.appendChild(variantBlock('Light', 'Tema chiaro — fondo Sabbia, luna Inchiostro.', LIGHT, 'light-strip'));
heroSec.appendChild(varRow);
root.appendChild(heroSec);

/* ── iOS tutte le misure ── */
function iosSec(title, params, stripClass) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="label">${title}</div>`;
  const strip = document.createElement('div');
  strip.className = stripClass + ' sizes-row';
  [[1024,'1024 · App Store'],[180,'180 · @3×'],[120,'120 · @2×'],[87,'87 · Spotlight'],[60,'60 · @2×'],[40,'40 · Notification'],[29,'29 · Settings'],[20,'20 · @1×']].forEach(([s,l]) => {
    strip.appendChild(cell(s, l, params));
  });
  sec.appendChild(strip);
  return sec;
}
root.appendChild(iosSec('iOS Dark — tutte le misure', DARK, 'dark-strip'));
root.appendChild(iosSec('iOS Light — tutte le misure', LIGHT, 'light-strip'));

/* ── Android adaptive ── */
function andSec(title, params, stripClass) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="label">${title}</div>`;
  const strip = document.createElement('div');
  strip.className = stripClass + ' android-row';
  [
    ['Cerchio','border-radius:50%'],
    ['Squircle','border-radius:26%'],
    ['Quadrato','border-radius:16%'],
  ].forEach(([l,css]) => strip.appendChild(androidCell(108, l + ' · 108px', params, css)));
  sec.appendChild(strip);
  return sec;
}
root.appendChild(andSec('Android Adaptive Dark', DARK, 'dark-strip'));
root.appendChild(andSec('Android Adaptive Light', LIGHT, 'light-strip'));
</script>
</body>
</html>
