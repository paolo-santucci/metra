<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Métra — Quick Entry · Proposta Flusso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #EAE3D9; font-family: 'Inter', sans-serif; }
    .page { min-height: 100vh; padding: 48px 32px 64px; display: flex; flex-direction: column; align-items: center; gap: 48px; }
    .states-row { display: flex; gap: 36px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
    .state-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .state-label {
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase; color: rgba(43,37,33,0.45);
    }
    .annotation {
      max-width: 960px; width: 100%; background: #FBF7F2;
      border-radius: 20px; border: 1px solid rgba(43,37,33,0.08);
      padding: 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 36px;
    }
    @media (max-width: 720px) { .annotation { grid-template-columns: 1fr; } }
    .ann-section { display: flex; flex-direction: column; gap: 10px; }
    .ann-title {
      font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: rgba(43,37,33,0.4);
    }
    .ann-body { font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(43,37,33,0.72); line-height: 1.65; }
    .ann-body strong { color: rgba(43,37,33,0.85); font-weight: 600; }
    .ann-body em { font-style: italic; color: rgba(43,37,33,0.6); }
    .model-table { width: 100%; border-collapse: collapse; }
    .model-table th, .model-table td {
      font-family: 'Inter', sans-serif; padding: 9px 10px;
      border-bottom: 1px solid rgba(43,37,33,0.06); text-align: left;
    }
    .model-table th { font-size: 10px; color: rgba(43,37,33,0.4); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .model-table td { font-size: 12px; color: rgba(43,37,33,0.72); }
    code {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 11px; background: rgba(43,37,33,0.07);
      padding: 1px 5px; border-radius: 4px; color: rgba(43,37,33,0.8);
    }
    .divider { width: 1px; background: rgba(43,37,33,0.08); align-self: stretch; }
    .tap-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .tap-badge {
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      background: rgba(43,37,33,0.08); color: rgba(43,37,33,0.7);
    }
    .tap-desc { font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(43,37,33,0.6); }
    .flag-block {
      padding: 12px 14px; border-radius: 10px;
      background: rgba(91,78,122,0.08); border-left: 3px solid #5B4E7A;
    }
    .flag-block p { font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(43,37,33,0.7); line-height: 1.6; }
    .flag-block .flag-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #5B4E7A; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    /* ─── TOKENS ─── */
    const C = {
      sabbia:     '#F4EDE2',
      terracotta: '#C87456',
      tc_scura:   '#9A4D32',
      lavanda:    '#5B4E7A',
      ocra:       '#D4A26A',
      ocra_scura: '#8A6332',
      malva:      '#9E7488',
      inchiostro: '#2B2521',
      surface:    '#FBF7F2',
    };

    /* ─── PHONE FRAME ─── */
    function Phone({ children }) {
      return (
        <div style={{
          width: 393, height: 760, borderRadius: 44, overflow: 'hidden',
          boxShadow: '0 28px 64px rgba(43,37,33,0.2), 0 4px 14px rgba(43,37,33,0.08)',
          position: 'relative', background: C.sabbia,
          border: '1px solid rgba(43,37,33,0.09)', flexShrink: 0
        }}>
          {/* Status bar */}
          <div style={{
            height: 54, background: 'rgba(244,237,226,0.96)', backdropFilter: 'blur(16px)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '0 28px', flexShrink: 0,
            borderBottom: '1px solid rgba(43,37,33,0.06)',
          }}>
            <span style={{ fontFamily: 'Inter', fontSize: 15, fontWeight: 600, color: C.inchiostro, letterSpacing: '-0.02em' }}>20:14</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                <rect x="0" y="8" width="3" height="4" rx="1" fill={C.inchiostro} opacity="0.4"/>
                <rect x="4.5" y="5" width="3" height="7" rx="1" fill={C.inchiostro} opacity="0.6"/>
                <rect x="9" y="2" width="3" height="10" rx="1" fill={C.inchiostro} opacity="0.8"/>
                <rect x="13.5" y="0" width="2.5" height="12" rx="1" fill={C.inchiostro}/>
              </svg>
              <svg width="20" height="12" viewBox="0 0 20 12" fill="none">
                <rect x="0.5" y="0.5" width="17" height="11" rx="2.5" stroke={C.inchiostro} strokeOpacity="0.35"/>
                <rect x="2" y="2" width="11" height="8" rx="1.5" fill={C.inchiostro}/>
                <path d="M19 4.5v3a1.5 1.5 0 0 0 0-3z" fill={C.inchiostro} fillOpacity="0.35"/>
              </svg>
            </div>
          </div>
          <div style={{ height: 'calc(100% - 54px)', overflowY: 'auto' }}>
            {children}
          </div>
        </div>
      );
    }

    /* ─── FLOW TYPE CHIPS ─── */
    function FlowTypeChips({ value, onChange }) {
      const types = [
        { id: 'assente',      label: 'Assente',      variant: 'neutral' },
        { id: 'mestruazioni', label: 'Mestruazioni', variant: 'flow'    },
        { id: 'spotting',     label: 'Spotting',     variant: 'spot'    },
      ];
      return (
        <div style={{ display: 'flex', gap: 8 }}>
          {types.map(t => {
            const sel = value === t.id;
            const bg = !sel ? 'rgba(43,37,33,0.04)' :
              t.variant === 'neutral' ? 'rgba(43,37,33,0.08)' :
              t.variant === 'flow'    ? `${C.terracotta}22` :
              `${C.terracotta}14`;
            const border = !sel ? '1px solid rgba(43,37,33,0.1)' :
              t.variant === 'neutral' ? '1.5px dashed rgba(43,37,33,0.32)' :
              t.variant === 'flow'    ? `1.5px solid ${C.terracotta}BB` :
              `1.5px solid ${C.terracotta}66`;
            const textColor = !sel ? 'rgba(43,37,33,0.42)' :
              t.variant === 'neutral' ? C.inchiostro : C.tc_scura;
            return (
              <div key={t.id} onClick={() => onChange(sel ? null : t.id)} style={{
                flex: 1, height: 44, borderRadius: 12,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: bg, border, cursor: 'pointer', transition: 'all 0.15s'
              }}>
                <span style={{ fontFamily: 'Inter', fontSize: 13, fontWeight: sel ? 500 : 400, color: textColor }}>
                  {t.label}
                </span>
              </div>
            );
          })}
        </div>
      );
    }

    /* ─── FLOW INTENSITY DOTS ─── */
    function FlowIntensityDots({ value, onChange }) {
      const R = 18, bx = (R + 7) * 2, cx = bx / 2;
      const opts = [
        { id: 1, label: 'Leggero',    fillOp: 0.30 },
        { id: 2, label: 'Moderato',   fillOp: 0.65 },
        { id: 3, label: 'Abbondante', fillOp: 0.94 },
      ];
      return (
        <div style={{ display: 'flex', gap: 10, alignItems: 'center', justifyContent: 'center', paddingTop: 16, paddingBottom: 2 }}>
          {opts.map(opt => {
            const sel = value === opt.id;
            return (
              <div key={opt.id} onClick={() => onChange(sel ? null : opt.id)}
                style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7, cursor: 'pointer' }}>
                <svg width={bx} height={bx} viewBox={`0 0 ${bx} ${bx}`}>
                  {sel && <circle cx={cx} cy={cx} r={R + 5} fill="none" stroke={C.terracotta} strokeWidth="1.2" opacity="0.3" />}
                  <circle cx={cx} cy={cx} r={R} fill={C.terracotta} fillOpacity={opt.fillOp} stroke={C.terracotta} strokeWidth="1.4" />
                </svg>
                <span style={{ fontFamily: 'Inter', fontSize: 10, color: sel ? C.tc_scura : 'rgba(43,37,33,0.4)', fontWeight: sel ? 600 : 400 }}>
                  {opt.label}
                </span>
              </div>
            );
          })}
        </div>
      );
    }

    /* ─── PAIN DOTS ─── */
    function PainDots({ value, onChange }) {
      const levels = [
        { id: 0, label: 'Nessuno',  fillOp: 0    },
        { id: 1, label: 'Lieve',    fillOp: 0.28 },
        { id: 2, label: 'Moderato', fillOp: 0.6  },
        { id: 3, label: 'Intenso',  fillOp: 0.92 },
      ];
      const R = 18, boxSize = (R + 7) * 2, cx = boxSize / 2;
      return (
        <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
          {levels.map(lv => {
            const sel = value === lv.id;
            return (
              <div key={lv.id} onClick={() => onChange(value === lv.id ? null : lv.id)}
                style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
                <svg width={boxSize} height={boxSize} viewBox={`0 0 ${boxSize} ${boxSize}`}>
                  {sel && <circle cx={cx} cy={cx} r={R + 5} stroke={C.malva} strokeWidth="1.2" fill="none" opacity="0.28" />}
                  <circle cx={cx} cy={cx} r={R} stroke={C.malva} strokeWidth="1.5" fill={C.malva} fillOpacity={lv.fillOp} />
                </svg>
                <span style={{ fontFamily: 'Inter', fontSize: 10, color: sel ? C.malva : 'rgba(43,37,33,0.38)', fontWeight: sel ? 600 : 400 }}>{lv.label}</span>
              </div>
            );
          })}
        </div>
      );
    }

    /* ─── CHIP ─── */
    function Chip({ label, selected, onToggle }) {
      return (
        <div onClick={onToggle} style={{
          display: 'inline-flex', alignItems: 'center',
          paddingInline: 14, height: 36,
          background: selected ? C.terracotta : 'rgba(43,37,33,0.07)',
          border: `1px solid ${selected ? 'transparent' : 'rgba(43,37,33,0.12)'}`,
          borderRadius: 18, cursor: 'pointer', transition: 'all 0.15s'
        }}>
          <span style={{ fontFamily: 'Inter', fontSize: 13, color: selected ? C.sabbia : C.inchiostro, fontWeight: selected ? 500 : 400 }}>{label}</span>
        </div>
      );
    }

    /* ─── SECTION LABEL ─── */
    function SectionLabel({ children }) {
      return (
        <div style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'rgba(43,37,33,0.4)', marginBottom: 14 }}>
          {children}
        </div>
      );
    }

    /* ─── REGISTRATION SCREEN ─── */
    function ScreenRegistrazione({ initType = null, initIntensity = null, initPain = null, initSymptoms = [] }) {
      const [flowType, setFlowType] = useState(initType);
      const [flowIntensity, setFlowIntensity] = useState(initIntensity);
      const [pain, setPain] = useState(initPain);
      const [symptoms, setSymptoms] = useState(new Set(initSymptoms));

      const SYMPTOMS = ['Crampi', 'Mal di testa', 'Stanchezza', 'Mal di schiena', 'Nausea', 'Gonfiore', 'Tensione mammaria'];
      const toggleSym = s => setSymptoms(prev => { const n = new Set(prev); n.has(s) ? n.delete(s) : n.add(s); return n; });
      const lastMensIntensityRef = React.useRef(2); // persists across renders without triggering re-render
      const handleFlowType = t => {
        if (t === 'mestruazioni') {
          setFlowIntensity(lastMensIntensityRef.current);
        } else {
          if (flowIntensity !== null) lastMensIntensityRef.current = flowIntensity;
          setFlowIntensity(null);
        }
        setFlowType(t);
      };

      return (
        <div style={{ background: C.sabbia, minHeight: '100%', paddingBottom: 110 }}>
          {/* Header */}
          <div style={{ padding: '14px 24px 18px' }}>
            <div style={{ fontFamily: 'Inter', fontSize: 13, color: 'rgba(43,37,33,0.68)', marginBottom: 2 }}>Martedì 23 aprile</div>
            <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 28, color: C.inchiostro, lineHeight: 1.1 }}>Come stai oggi?</div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>

            {/* ── FLUSSO ── */}
            <div style={{ background: C.surface, borderTop: '1px solid rgba(43,37,33,0.07)', borderBottom: '1px solid rgba(43,37,33,0.07)', padding: '18px 24px' }}>
              <SectionLabel>Flusso</SectionLabel>

              <FlowTypeChips value={flowType} onChange={handleFlowType} />

              {/* Mestruazioni → intensity dots */}
              {flowType === 'mestruazioni' && (
                <FlowIntensityDots value={flowIntensity} onChange={setFlowIntensity} />
              )}

              {/* Spotting → helper note */}
              {flowType === 'spotting' && (
                <div style={{ marginTop: 14, padding: '11px 14px', borderRadius: 10, background: `${C.terracotta}0D`, border: `1px solid ${C.terracotta}28` }}>
                  <span style={{ fontFamily: 'Inter', fontSize: 12, color: 'rgba(43,37,33,0.65)', lineHeight: 1.55 }}>
                    Piccola perdita fuori dal flusso mestruale. Non è necessariamente l'inizio del ciclo.
                  </span>
                </div>
              )}

              {/* Assente → soft confirmation */}
              {flowType === 'assente' && (
                <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 8 }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12l5 5 9-9" stroke="rgba(43,37,33,0.35)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <span style={{ fontFamily: 'Inter', fontSize: 12, color: 'rgba(43,37,33,0.45)' }}>Nessun flusso oggi</span>
                </div>
              )}
            </div>

            {/* ── DOLORE ── */}
            <div style={{ background: C.surface, borderBottom: '1px solid rgba(43,37,33,0.07)', padding: '18px 24px' }}>
              <SectionLabel>Intensità dolore</SectionLabel>
              <PainDots value={pain} onChange={setPain} />
            </div>

            {/* ── SINTOMI ── */}
            <div style={{ background: C.surface, borderBottom: '1px solid rgba(43,37,33,0.07)', padding: '18px 24px' }}>
              <SectionLabel>Sintomi</SectionLabel>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {SYMPTOMS.map(s => (
                  <div key={s} style={{ minHeight: 44, display: 'flex', alignItems: 'center' }}>
                    <Chip label={s} selected={symptoms.has(s)} onToggle={() => toggleSym(s)} />
                  </div>
                ))}
                <div style={{ minHeight: 44, display: 'flex', alignItems: 'center' }}>
                  <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, paddingInline: 14, height: 36, borderRadius: 18, border: '1px dashed rgba(43,37,33,0.25)', cursor: 'pointer' }}>
                    <span style={{ fontFamily: 'Inter', fontSize: 20, color: 'rgba(43,37,33,0.35)', lineHeight: 1, marginTop: -1 }}>+</span>
                    <span style={{ fontFamily: 'Inter', fontSize: 13, color: 'rgba(43,37,33,0.4)' }}>Aggiungi</span>
                  </div>
                </div>
              </div>
            </div>

          </div>

          {/* CTA */}
          <div style={{ padding: '20px 24px' }}>
            <div style={{ height: 56, background: C.inchiostro, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
              <span style={{ fontFamily: 'Inter', fontSize: 16, fontWeight: 500, color: C.sabbia }}>Salva giornata</span>
            </div>
          </div>
        </div>
      );
    }

    /* ─── PAGE TITLE ─── */
    function PageTitle() {
      return (
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 30, color: '#2B2521', letterSpacing: '-0.01em' }}>
            Mētra — Quick Entry
          </div>
          <div style={{ fontFamily: 'Inter', fontSize: 13, color: 'rgba(43,37,33,0.5)', marginTop: 6 }}>
            Proposta: chip tipo + intensità flusso — quattro stati interattivi
          </div>
        </div>
      );
    }

    /* ─── ANNOTATION ─── */
    function Annotation() {
      return (
        <div className="annotation">

          {/* Data model */}
          <div className="ann-section">
            <div className="ann-title">Modello dati</div>
            <table className="model-table">
              <thead>
                <tr><th>Campo</th><th>Tipo</th><th>Valori</th></tr>
              </thead>
              <tbody>
                <tr>
                  <td><code>bleeding.flow</code></td>
                  <td style={{color:'rgba(43,37,33,0.45)'}}>int | null</td>
                  <td>
                    <code>null</code> = non registrato<br/>
                    <code>-1</code> = Assente<br/>
                    <code>0</code> = Spotting (IMB)<br/>
                    <code>1</code> = Leggero · <code>2</code> = Moderato · <code>3</code> = Abbondante
                  </td>
                </tr>
              </tbody>
            </table>
            <div className="ann-body" style={{marginTop:6}}>
              <strong>null</strong> = giornata non aperta<br/>
              <strong>−1</strong> = confermato nessun sanguinamento<br/>
              <strong>0</strong> = IMB: perdita intermestruale (flag clinico distinto)<br/>
              <strong>1–3</strong> = flusso mestruale con scala di intensità
            </div>
          </div>

          {/* Why unified row */}
          <div className="ann-section">
            <div className="ann-title">Vocabolario di tratto e struttura</div>
            <div className="ann-body">
              Tutto in <strong>un'unica riga</strong> — zero tap aggiuntivi. Il confine
              categorico è comunicato da tre livelli di segnale:<br/><br/>
              <strong>Tratto:</strong> Assente = tratteggiato (assenza confermata); Spotting = pieno
              senza riempimento + punto centrale (evento presente, non quantificato);
              Leggero/Moderato/Abbondante = pieno con riempimento crescente (scala ordinale).<br/><br/>
              <strong>Struttura:</strong> etichetta "Mestruazioni" sopra il solo cluster destro —
              nomina il fenomeno senza suggerire che Spotting abbia un sotto-livello di intensità.
              Cluster sinistro (Assente + Spotting) intenzionalmente non etichettato: elementi
              senza etichetta di gruppo si leggono come casi speciali, non come categoria.<br/><br/>
              <strong>Affordance ⓘ:</strong> tocco persistente su Spotting apre il criterio
              comportamentale clinico (FIGO 2018) — assorbente necessario? Seleziona Leggero o superiore.
            </div>
            <div className="flag-block" style={{marginTop:4}}>
              <div className="flag-title">Fonte clinica</div>
              <p>Munro et al., FIGO classification of AUB 2018 — distingue HMB (flusso mestruale)
              da IMB (sanguinamento intermestruale / spotting) come categorie diagnostiche separate.
              Il criterio "assorbente necessario" è il discriminatore comportamentale raccomandato
              per la popolazione a rischio di misclassificazione (post-parto, perimenopausa,
              contraccettivi ormonali).</p>
            </div>
          </div>

          {/* Tap count */}
          <div className="ann-section">
            <div className="ann-title">Conteggio tap</div>
            <div style={{display:'flex', flexDirection:'column', gap:10}}>
              <div>
                <div className="tap-row">
                  <span className="tap-badge">2 tap</span>
                  <span className="tap-desc">Giornata mestruale completa</span>
                </div>
                <div style={{fontFamily:'Inter', fontSize:11, color:'rgba(43,37,33,0.5)', paddingLeft:2}}>
                  [Moderato] → [Crampi] — nessun tap extra per il tipo
                </div>
              </div>
              <div>
                <div className="tap-row">
                  <span className="tap-badge">1 tap</span>
                  <span className="tap-desc">Spotting</span>
                </div>
                <div style={{fontFamily:'Inter', fontSize:11, color:'rgba(43,37,33,0.5)', paddingLeft:2}}>
                  [Spotting] — stessa riga, zero tap aggiuntivi
                </div>
              </div>
              <div>
                <div className="tap-row">
                  <span className="tap-badge">1 tap</span>
                  <span className="tap-desc">Giornata senza sanguinamento</span>
                </div>
                <div style={{fontFamily:'Inter', fontSize:11, color:'rgba(43,37,33,0.5)', paddingLeft:2}}>
                  [Assente] — confermato, distinto da null
                </div>
              </div>
            </div>
          </div>

          {/* Edge cases */}
          <div className="ann-section">
            <div className="ann-title">Casi limite</div>
            <div className="ann-body">
              <strong>Primo/ultimo giorno di ciclo:</strong> flusso leggero ma mestruale
              → selezionare Leggero (1). Spotting è per definizione intermestruale.<br/><br/>
              <strong>Spotting + dolore:</strong> Spotting (0) + PainDots → corretto,
              il dolore è ortogonale al tipo di sanguinamento.<br/><br/>
              <strong>Mestruazioni senza intensità specificata:</strong> non possibile in questa UI
              — ogni livello mestruale è già un'intensità esplicita.<br/><br/>
              <strong>Deseleziona:</strong> tap sull'opzione attiva la riporta a null (−2 / non registrato).
            </div>
          </div>

        </div>
      );
    }

    /* ─── APP ─── */
    function App() {
      return (
        <div className="page">
          <PageTitle />

          <div className="states-row">
            <div className="state-col">
              <div className="state-label">① Vuoto</div>
              <Phone>
                <ScreenRegistrazione />
              </Phone>
            </div>
            <div className="state-col">
              <div className="state-label">② Mestruazioni · Moderato</div>
              <Phone>
                <ScreenRegistrazione
                  initType="mestruazioni"
                  initIntensity={2}
                  initPain={2}
                  initSymptoms={['Crampi']}
                />
              </Phone>
            </div>
            <div className="state-col">
              <div className="state-label">③ Spotting</div>
              <Phone>
                <ScreenRegistrazione
                  initType="spotting"
                  initPain={1}
                />
              </Phone>
            </div>
            <div className="state-col">
              <div className="state-label">④ Assente</div>
              <Phone>
                <ScreenRegistrazione
                  initType="assente"
                />
              </Phone>
            </div>
          </div>

          <Annotation />

          <div style={{ fontFamily: 'Inter', fontSize: 11, color: 'rgba(43,37,33,0.35)' }}>
            Métra Design System · Quick Entry · Chip tipo + intensità flusso · Aprile 2026 · Tutti gli stati sono interattivi
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
