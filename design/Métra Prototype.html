<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: #1A1410;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}
/* Phone shell */
.phone-shell {
  width: 393px;
  height: 852px;
  border-radius: 54px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1.5px rgba(255,255,255,0.12),
    0 0 0 8px rgba(0,0,0,0.6),
    0 0 0 9px rgba(255,255,255,0.08),
    0 32px 80px rgba(0,0,0,0.7);
  background: #000;
  flex-shrink: 0;
}
/* Dynamic island */
.dynamic-island {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 36px;
  background: #000;
  border-radius: 20px;
  z-index: 100;
}
/* Status bar */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0; height: 54px;
  display: flex; align-items: flex-end;
  justify-content: space-between;
  padding: 0 28px 8px;
  z-index: 50;
  pointer-events: none;
}
/* Home indicator */
.home-bar {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  width: 134px; height: 5px;
  border-radius: 3px;
  z-index: 50;
  pointer-events: none;
}
/* Screen area */
.screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}
/* Transition */
.screen-enter { animation: slideIn 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
.screen-exit { animation: slideOut 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
.screen-back { animation: slideBack 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(-30%); opacity: 0.5; } }
@keyframes slideBack { from { transform: translateX(-30%); opacity: 0.5; } to { transform: translateX(0); } }

/* External controls */
.controls {
  position: fixed; top: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 10px;
  z-index: 200;
}
.ctrl-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 20px; border: none; cursor: pointer;
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  backdrop-filter: blur(8px); transition: background 0.15s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.18); }
.ctrl-btn.active { background: rgba(200,116,86,0.7); color: #fff; }
</style>

/* ─── TAB BAR ─── */
function TabBar({ active, navigate, t, s }) {
  const tabs = [
    { id:'calendar', icon:'calendar', label:s.cal },
    { id:'log', icon:'note', label:s.today },
    { id:'archive', icon:'wave', label:s.archive },
    { id:'stats', icon:'chart', label:s.stats },
    { id:'settings', icon:'settings', label:s.settings },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, height:84,
      background:t.tabBg, backdropFilter:'blur(16px)',
      borderTop:`1px solid ${t.border}`,
      display:'flex', alignItems:'flex-start', paddingTop:10, zIndex:40,
    }}>
      {tabs.map(tab => {
        const on = active === tab.id;
        return (
          <div key={tab.id} onClick={() => navigate(tab.id)}
            style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor:'pointer' }}>
            <Icon name={tab.icon} size={24} color={on ? t.tc : t.inkLow} stroke={on?2:1.5}/>
            <span style={{ fontFamily:'Inter', fontSize:10, fontWeight:on?600:400, color:on?t.tc:t.inkLow }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ─── FLOW DOTS ─── */
function FlowDots({ value, onChange, t, s }) {
  const opts = [
    { id:0, label:s.flowNone,  fillOp:0 },
    { id:1, label:s.flowSpot,  fillOp:0.14 },
    { id:2, label:s.flowLight, fillOp:0.38 },
    { id:3, label:s.flowMed,   fillOp:0.68 },
    { id:4, label:s.flowHeavy, fillOp:0.96 },
  ];
  const R = 19, box = (R+7)*2, cx = box/2;
  return (
    <div style={{ display:'flex', gap:12, alignItems:'center' }}>
      {opts.map(o => {
        const sel = value===o.id;
        return (
          <div key={o.id} onClick={() => onChange(o.id)}
            style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6, cursor:'pointer' }}>
            <svg width={box} height={box} viewBox={`0 0 ${box} ${box}`}>
              {sel && <circle cx={cx} cy={cx} r={R+5} stroke={t.tc} strokeWidth="1.2" fill="none" opacity="0.28"/>}
              <circle cx={cx} cy={cx} r={R} stroke={t.tc} strokeWidth="1.5" fill={t.tc} fillOpacity={o.fillOp}/>
            </svg>
            <span style={{ fontFamily:'Inter', fontSize:10, color:sel?t.tc:t.inkLow, fontWeight:sel?600:400 }}>{o.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ─── PAIN DOTS ─── */
function PainDots({ value, onChange, t, s }) {
  const opts = [
    { id:0, label:s.painNone,  fillOp:0 },
    { id:1, label:s.painLight, fillOp:0.28 },
    { id:2, label:s.painMed,   fillOp:0.6 },

  const R = 19, box = (R+7)*2, cx = box/2;
  return (
    <div style={{ display:'flex', gap:14, alignItems:'center' }}>
      {opts.map(o => {
        const sel = value===o.id;
        return (
          <div key={o.id} onClick={() => onChange(o.id)}
            style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6, cursor:'pointer' }}>
            <svg width={box} height={box} viewBox={`0 0 ${box} ${box}`}>
              {sel && <circle cx={cx} cy={cx} r={R+5} stroke={t.malva} strokeWidth="1.2" fill="none" opacity="0.28"/>}
              <circle cx={cx} cy={cx} r={R} stroke={t.malva} strokeWidth="1.5" fill={t.malva} fillOpacity={o.fillOp}/>
            </svg>
            <span style={{ fontFamily:'Inter', fontSize:10, color:sel?t.malva:t.inkLow, fontWeight:sel?600:400 }}>{o.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ─── CHIP ─── */
function Chip({ label, selected, onToggle, t }) {
  return (
    <div onClick={onToggle} style={{
      display:'inline-flex', alignItems:'center',
      paddingInline:14, height:36,
      background: selected ? t.tc : `${t.ink}10`,
      border:`1px solid ${selected ? 'transparent' : t.border}`,
      borderRadius:18, cursor:'pointer', transition:'all 0.15s',
    }}>
      <span style={{ fontFamily:'Inter', fontSize:13, fontWeight:500, color:selected?t.bg:t.ink }}>{label}</span>
    </div>
  );
}

        <div style={{ height:52, background:t.surface, border:`1.5px solid ${t.border}`, borderRadius:12, display:'flex', alignItems:'center', paddingInline:16, justifyContent:'space-between' }}>

      </div>
    </div>
  );
}

/* CALENDAR */
const FLOW_DAYS = [10,11,12,13,14];
const OVUL_DAY = 24;
const SYM_DAYS = [16,17,21,22];
const DAYS_IT = ['L','M','M','G','V','S','D'];
const DAYS_EN = ['M','T','W','T','F','S','S'];

function ScreenCalendar({ navigate, t, s }) {
  const font = "'DM Serif Display', serif";
  const [sel, setSel] = useState(10);
  const days = s === STR.it ? DAYS_IT : DAYS_EN;
  const cells = [null, ...Array.from({length:30},(_,i)=>i+1)]; // April 2025 starts Tuesday

  return (
    <div style={{ height:'100%', background:t.bg, display:'flex', flexDirection:'column' }}>
      <StatusBar t={t}/>
      <div style={{ flex:1, overflowY:'auto', paddingTop:54, paddingBottom:84 }}>
        {/* Month header */}
        <div style={{ padding:'12px 24px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <div style={{ fontFamily:font, fontSize:26, color:t.ink }}>{s.april}</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:3 }}>
              <MoonIcon size={14} color={t.ink}/>
              <span style={{ fontFamily:'Inter', fontSize:13, color:t.inkMid }}>{s.day14}</span>
            </div>
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <Icon name="chevron_left" size={22} color={t.inkLow}/>
            <Icon name="chevron_right" size={22} color={t.ink}/>
          </div>
        </div>

        {/* Day headers */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', padding:'16px 12px 4px' }}>
          {days.map((d,i) => <div key={i} style={{ textAlign:'center', fontFamily:'Inter', fontSize:12, fontWeight:600, color:t.inkLow }}>{d}</div>)}
        </div>

        {/* Calendar grid */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', padding:'0 12px', gap:'2px 0' }}>
          {cells.map((day,i) => {
            if (!day) return <div key={i} style={{ height:48 }}/>;
            const isFlow = FLOW_DAYS.includes(day);
            const isOvul = OVUL_DAY === day;
            const hasSym = SYM_DAYS.includes(day);
            const isSel = sel === day;
            return (
              <div key={i} onClick={() => setSel(day)} style={{
                height:48, borderRadius:12, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2,
                background: isSel ? t.ink : isFlow ? `${t.tc}22` : isOvul ? `${t.lav}18` : 'transparent',
                border:`1px solid ${isSel?'transparent':isFlow?`${t.tc}44`:isOvul?`${t.lav}55`:'transparent'}`,
                cursor:'pointer',
              }}>
                <span style={{ fontFamily:'Inter', fontSize:15, fontWeight:isSel?600:400, color:isSel?t.bg:t.ink }}>{day}</span>
                <div style={{ display:'flex', gap:3 }}>
                  {isFlow && <div style={{ width:5,height:5,borderRadius:'50%',background:isSel?t.bg:t.tc }}/>}
                  {isOvul && <div style={{ width:5,height:5,borderRadius:'50%',background:isSel?t.bg:t.lav }}/>}
                  {hasSym&&!isFlow&&!isOvul && <div style={{ width:5,height:5,borderRadius:'50%',background:isSel?t.bg:t.ocra }}/>}
                </div>
              </div>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{ display:'flex', gap:16, padding:'10px 24px', borderTop:`1px solid ${t.border}` }}>
          {[[t.tc,s.menstr],[t.lav,s.ovul],[t.ocra,s.symLabel]].map(([c,l]) => (
            <div key={l} style={{ display:'flex', alignItems:'center', gap:5 }}>
              <div style={{ width:8,height:8,borderRadius:'50%',background:c }}/>
              <span style={{ fontFamily:'Inter', fontSize:11, color:t.inkMid }}>{l}</span>
            </div>
          ))}
        </div>

        {/* Day detail */}
        <div style={{ margin:'4px 16px', background:t.surface, borderRadius:20, border:`1px solid ${t.border}`, padding:'16px 20px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <div>
              <div style={{ fontFamily:font, fontSize:20, color:t.ink }}>{s.thu10}</div>
              <div style={{ fontFamily:'Inter', fontSize:13, color:t.inkMid, marginTop:2 }}>{s.cycleDay1}</div>
            </div>
            <div style={{ paddingInline:12,height:32,background:`${t.tc}18`,border:`1px solid ${t.tc}44`,borderRadius:10,display:'flex',alignItems:'center' }}>
              <span style={{ fontFamily:'Inter', fontSize:12, fontWeight:500, color:t.tcDark }}>{s.flowHeavy}</span>
            </div>
          </div>
          <div onClick={() => navigate('log')} style={{ height:44, background:`${t.tc}10`, border:`1px solid ${t.tc}22`, borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <Icon name="note" size={16} color={t.tc}/>
            <span style={{ fontFamily:'Inter', fontSize:14, fontWeight:500, color:t.tc, marginLeft:6 }}>{s.edit}</span>
          </div>
        </div>
      </div>

      <TabBar active="calendar" navigate={navigate} t={t} s={s}/>
      <HomeBar t={t}/>
    </div>
  );
}

/* LOG */

            <div style={{ minHeight:72, background:`${t.ink}07`, border:`1.5px solid ${t.border}`, borderRadius:12, padding:'12px 14px' }}>

          }}>

            }

      <HomeBar t={t}/>
    </div>
  );

/* STATS */
function ScreenStats({ navigate, t, s }) {
  const font = "'DM Serif Display', serif";
  const stats = [
    { title:s.avgCycle, value:'28', unit:s.days, sub:'Range: 27–30', accent:true },
    { title:s.avgFlow, value:'4.8', unit:s.days, sub:'Range: 4–6' },
    { title:s.avgPain, value:'2.4', unit:'/3' },
    { title:s.cycles, value:'6', unit:s.total },
  ];
  const months = ['Apr','Mar','Feb','Gen','Dic','Nov'];
  const data = [3,2,3,1,4,2];
  const W = 290, H = 140, cx2 = W/2, cy2 = H-8, R = 100;

  return (
    <div style={{ height:'100%', background:t.bg, display:'flex', flexDirection:'column' }}>
      <StatusBar t={t}/>
      <div style={{ flex:1, overflowY:'auto', paddingTop:54, paddingBottom:84 }}>
        <div style={{ padding:'12px 24px 20px' }}>
          <div style={{ fontFamily:font, fontSize:26, color:t.ink }}>{s.stats}</div>
          <div style={{ fontFamily:'Inter', fontSize:13, color:t.inkMid, marginTop:4 }}>{s.last6}</div>
        </div>

        {/* Stat cards */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:12, padding:'0 16px 20px' }}>
          {stats.map((st,i) => (
            <div key={i} style={{ flex:'1 1 calc(50% - 6px)', background:t.surface, borderRadius:16, border:`1px solid ${st.accent?`${t.tc}44`:t.border}`, padding:'16px 18px' }}>
              <div style={{ fontFamily:'Inter', fontSize:12, color:t.inkMid, marginBottom:6 }}>{st.title}</div>
              <div style={{ display:'flex', alignItems:'baseline', gap:4 }}>
                <span style={{ fontFamily:font, fontSize:32, color:st.accent?t.tc:t.ink }}>{st.value}</span>
                <span style={{ fontFamily:'Inter', fontSize:14, color:t.inkMid }}>{st.unit}</span>
              </div>
              {st.sub && <div style={{ fontFamily:'Inter', fontSize:12, color:t.inkMid, marginTop:4 }}>{st.sub}</div>}
            </div>
          ))}
        </div>

        {/* Pain semicircle */}
        <div style={{ background:t.surface, margin:'0 16px 16px', borderRadius:16, border:`1px solid ${t.border}`, padding:'18px 16px' }}>
          <div style={{ fontFamily:'Inter', fontSize:13, fontWeight:500, color:t.ink, marginBottom:2 }}>{s.pain}</div>
          <div style={{ fontFamily:'Inter', fontSize:11, color:t.inkMid, marginBottom:10 }}>{s.last6}</div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:'block' }}>
            <path d={`M ${cx2-R},${cy2} A ${R},${R} 0 0,1 ${cx2+R},${cy2}`} fill="none" stroke={t.border} strokeWidth="1"/>
            {data.map((val,i) => {
              const angle = Math.PI - i*(Math.PI/5);
              const x = cx2 + R*Math.cos(angle);
              const y = cy2 - R*Math.sin(angle);
              const r = 5 + val*5;
              return (
                <g key={i}>
                  <circle cx={x} cy={y} r={r} fill={t.malva} fillOpacity={0.1+val/3*0.7}/>
                  <circle cx={x} cy={y} r={2.5} fill={t.malva} fillOpacity="0.75"/>
                  <text x={x} y={y-r-4} textAnchor="middle" fontFamily="Inter" fontSize="11" fill={t.malva} fillOpacity="0.75" fontWeight="600">{val}</text>
                  <text x={x} y={y+r+12} textAnchor="middle" fontFamily="Inter" fontSize="10" fill={t.inkLow}>{months[i]}</text>
                </g>
              );
            })}
          </svg>
        </div>
      </div>
      <TabBar active="stats" navigate={navigate} t={t} s={s}/>
      <HomeBar t={t}/>
    </div>
  );
}

  function Row({ icon, label, right, onClick }) {

      <div style={{ display:'inline-flex', background:`${t.ink}10`, borderRadius:8, padding:3, gap:2 }}>
        {options.map(([v,l]) => (

        ))}

    );

          <div style={{ fontFamily:font, fontSize:18, color:t.ink, marginBottom:4 }}>
            M<span style={{ position:'relative', display:'inline-block' }}>e<span style={{ position:'absolute', top:'0.28em', left:'0.08em', right:'0.08em', height:'0.055em', background:t.tc, borderRadius:'1px' }}/></span>tra

}

/* ─── ROUTER ─── */
const SCREENS = ['onboarding1','onboarding2','calendar','log','archive','stats','settings'];
const TAB_SCREENS = ['calendar','log','archive','stats','settings'];

function App() {
  const [screen, setScreen] = useState('onboarding1');
  const [prev, setPrev] = useState(null);
  const [dir, setDir] = useState('forward');
  const [theme, setTheme] = useState('light');
  const [lang, setLang] = useState('it');

  const t = theme === 'light' ? LIGHT : DARK;
  const s = STR[lang];

  const navigate = useCallback((to) => {
    const fromIdx = SCREENS.indexOf(screen);
    const toIdx = SCREENS.indexOf(to);
    setDir(toIdx >= fromIdx ? 'forward' : 'back');
    setPrev(screen);
    setScreen(to);
  }, [screen]);

  const screenProps = { navigate, theme, setTheme, lang, setLang, t, s };

  const renderScreen = (id) => {
    switch(id) {
      case 'onboarding1': return <ScreenOnboarding1 {...screenProps}/>;
      case 'onboarding2': return <ScreenOnboarding2 {...screenProps}/>;
      case 'calendar':    return <ScreenCalendar {...screenProps}/>;
      case 'log':         return <ScreenLog {...screenProps}/>;
      case 'archive':     return <ScreenArchive {...screenProps}/>;
      case 'stats':       return <ScreenStats {...screenProps}/>;
      case 'settings':    return <ScreenSettings {...screenProps}/>;
      default:            return null;
    }
  };

  return (
    <>
      {/* External controls */}
      <div className="controls">
        <button className={`ctrl-btn ${theme==='light'?'active':''}`} onClick={() => setTheme(theme==='light'?'dark':'light')}>
          <Icon name={theme==='light'?'sun':'moon'} size={14} color="#fff"/>
          {theme==='light'?'Light':'Dark'}
        </button>
        <button className={`ctrl-btn ${lang==='it'?'active':''}`} onClick={() => setLang(lang==='it'?'en':'it')}>
          <Icon name="globe" size={14} color="#fff"/>
          {lang==='it'?'IT · EN':'EN · IT'}
        </button>
      </div>

      {/* Phone */}
      <div className="phone-shell">
        <div className="screen">
          <div key={screen} className={`screen ${dir==='forward'?'screen-enter':'screen-back'}`}
            style={{ position:'absolute', inset:0 }}>
            {renderScreen(screen)}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
