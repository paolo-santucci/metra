title: Métra
description: Un quaderno silenzioso per conoscerti, ciclo dopo ciclo.
url: "https://paolo-santucci.github.io"
baseurl: ""

# Navigation — Italian
navigation_it:
  - title: Guida
    url: /it/help/
  - title: Novità
    url: /it/#novita
  - title: Privacy
    url: /it/privacy/

# Navigation — English
navigation_en:
  - title: Help
    url: /en/help/
  - title: News
    url: /en/#news
  - title: Privacy
    url: /en/privacy/

# Theme
remote_theme: false

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Defaults
defaults:
  - scope:
      path: "it"
    values:
      lang: it
  - scope:
      path: "en"
    values:
      lang: en
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
