<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #C87456;
  --accent-dark: #9A4D32;
  --font-display: 'DM Serif Display', serif;
  --canvas-gap: 72px;
}
body { background: #E2D9C8; font-family: 'Inter', sans-serif; min-height: 100vh; }
.canvas { padding: 56px 48px 100px; display: flex; flex-direction: column; gap: var(--canvas-gap); }

  font-family: 'Inter', sans-serif;

.phone {
  width: 393px; height: 760px;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(43,37,33,0.14),

    0 16px 56px rgba(43,37,33,0.2);

}
.sb {
  position: absolute; top: 0; left: 0; right: 0; height: 54px;
  display: flex; align-items: flex-end; justify-content: space-between;

}
.di {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);

  background: #1A1410; border-radius: 20px; z-index: 20;
}
.sc { position: absolute; top: 54px; left: 0; right: 0; bottom: 0; overflow: hidden; }
.hi {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);

}

<body>
<div id="root"></div>
<script type="text/babel">








const { useState, useRef } = React;
const { createContext, useContext, useEffect } = React;

/* ─── TWEAKS CONTEXT ─── */
const PALETTES = {
  terracotta: { accent: '#C87456', accentDark: '#9A4D32' },
  lavanda: { accent: '#5B4E7A', accentDark: '#3D3358' },
  pietra: { accent: '#5C5248', accentDark: '#2B2521' }
};
const FONTS = {
  romantico: "'DM Serif Display', serif",
  netto: "'Inter', sans-serif",
  editoriale: "'Cormorant Garamond', serif"
};

const TweaksCtx = createContext({ accent: (C) => C.terracotta, accentDark: (C) => C.tc_scura, fontDisplay: "'DM Serif Display', serif" });
const useT = () => useContext(TweaksCtx);

function TweaksProvider({ palette = 'terracotta', voce = 'romantico', respiro = 1, children }) {
  const pal = PALETTES[palette] || PALETTES.terracotta;
  const fontDisplay = FONTS[voce] || FONTS.romantico;
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', pal.accent);
    r.style.setProperty('--accent-dark', pal.accentDark);
    r.style.setProperty('--font-display', fontDisplay);
    r.style.setProperty('--canvas-gap', `${Math.round(72 * respiro)}px`);
  }, [palette, voce, respiro]);
  const val = { ...pal, fontDisplay, respiro, sectionPadV: Math.round(18 * respiro) };
  return <TweaksCtx.Provider value={val}>{children}</TweaksCtx.Provider>;
}

/* ─── TOKENS ─── */
const C = {
  sabbia: '#F4EDE2', terracotta: '#C87456', tc_scura: '#9A4D32',
  ocra: '#D4A26A', lavanda: '#5B4E7A', malva: '#9E7488', muschio: '#7A8471',
  inchiostro: '#2B2521', bianco: '#FDFAF6',
  surface: '#FAF5EE'
};

/* ─── ICON ─── */
function Icon({ name, size = 24, color = C.inchiostro, stroke = 1.5 }) {
  const p = { stroke: color, strokeWidth: stroke, strokeLinecap: 'round', strokeLinejoin: 'round', fill: 'none' };
  const icons = {
    chevron_right: <path d="M9 6l6 6-6 6" {...p} />,
    chevron_left: <path d="M15 6l-6 6 6 6" {...p} />,
    chevron_down: <path d="M6 9l6 6 6-6" {...p} />,
    x: <path d="M18 6L6 18M6 6l12 12" {...p} />,
    lock: <><rect x="5" y="11" width="14" height="10" rx="2" {...p} /><path d="M8 11V7a4 4 0 0 1 8 0v4" {...p} /></>,
    cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" {...p} />,
    drop: <path d="M12 3C12 3 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12-7-12z" {...p} />,
    wave: <path d="M3 12 Q6 9 9 12 Q12 15 15 12 Q18 9 21 12" {...p} />,
    plus: <><path d="M12 5v14M5 12h14" {...p} /></>,
    check: <path d="M5 12l5 5 9-9" {...p} />,
    settings: <><circle cx="12" cy="12" r="3" {...p} /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" {...p} /></>,
    chart: <><path d="M4 20h16" {...p} /><rect x="5" y="11" width="3" height="9" rx="1" {...p} /><rect x="10.5" y="7" width="3" height="13" rx="1" {...p} /><rect x="16" y="4" width="3" height="16" rx="1" {...p} /></>,
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2" {...p} /><path d="M16 2v4M8 2v4M3 10h18" {...p} /></>,
    note: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" {...p} /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z" {...p} /></>,
    wifi: <><path d="M5 12.55a11 11 0 0 1 14.08 0" {...p} /><path d="M1.42 9a16 16 0 0 1 21.16 0" {...p} /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" {...p} /><circle cx="12" cy="20" r="1" fill={color} stroke="none" /></>,
    battery: <><rect x="1" y="6" width="18" height="12" rx="2" {...p} /><path d="M23 13v-2" {...p} /><rect x="3" y="8" width="12" height="8" rx="1" fill={color} stroke="none" fillOpacity="0.55" /></>,
    filter: <><path d="M22 3H2l8 9.46V19l4 2v-8.54z" {...p} /></>,
    info: <><circle cx="12" cy="12" r="9" {...p} /><path d="M12 8v1M12 12v4" {...p} /></>,
    leaf: <path d="M5 19C5 12 8 5 19 5c0 11-7 14-14 14z" {...p} />,
    export: <><path d="M12 16V4M8 8l4-4 4 4" {...p} /><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2" {...p} /></>,
    moon_crescent: <><path d="M12 3a9 9 0 1 0 9 9 6.5 6.5 0 0 1-9-9z" {...p} /></>,
    star_small: <path d="M12 4l1.5 4.5H18l-3.75 2.75 1.5 4.5L12 13l-3.75 2.75 1.5-4.5L6 8.5h4.5z" {...p} />,
    today_fold: <>
      <path d="M5 5 L15 5 L19 9 L19 19 L5 19 Z" {...p} />
      <path d="M15 5 L19 5 L19 9 Z" {...p} />
      <rect x="10.5" y="11" width="3" height="3" rx="0.8" fill={color} stroke="none" />
    </>
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none">{icons[name] ?? <circle cx="12" cy="12" r="9" stroke={color} strokeWidth={stroke} />}</svg>;
}

/* ─── DATA ICON (filled — semantic data markers: drop, moon, star) ─── */
function DataIcon({ name, size = 12, color }) {
  const paths = {
    drop: <path d="M12 3C12 3 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12-7-12z" fill={color} />,
    drop_outline: <path d="M12 3C12 3 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12-7-12z" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />,
    moon_crescent: <path d="M12 3a9 9 0 1 0 9 9 6.5 6.5 0 0 1-9-9z" fill={color} />,
    star_small: <path d="M12 4l1.5 4.5H18l-3.75 2.75 1.5 4.5L12 13l-3.75 2.75 1.5-4.5L6 8.5h4.5z" fill={color} />,
    zap: <path d="M13 3L5 14L11 14L9 21L19 11L13 11Z" fill={color} />
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">{paths[name] ?? null}</svg>;
}

/* ─── MOON ─── */
function Moon({ phase = 2, size = 20, color = C.inchiostro }) {
  const fills = [[], [
  <path key="a" d="M12 3a9 9 0 0 0 0 18 6 6 0 0 1 0-18z" fill={color} fillOpacity="0.8" />],
  [
  <path key="a" d="M12 3v18a9 9 0 0 0 0-18z" fill={color} fillOpacity="0.8" />],
  [
  <path key="a" d="M12 3a9 9 0 0 1 0 18 4 4 0 0 0 0-18z" fill={color} fillOpacity="0.8" />],
  [
  <circle key="a" cx="12" cy="12" r="9" fill={color} fillOpacity="0.8" />]];

  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.3" />
      {fills[Math.min(phase, 4)]}
    </svg>);

}

/* ─── PHONE SHELL ─── */
function Phone({ children, bg = C.sabbia }) {
  return (
    <div className="phone" style={{ background: bg }}>
      <div className="sb">
        <span style={{ fontFamily: 'Inter', fontSize: 15, fontWeight: 600, color: C.inchiostro, letterSpacing: '-0.02em' }}>20:14</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <Icon name="wifi" size={15} color={C.inchiostro} stroke={1.8} />
          <Icon name="battery" size={19} color={C.inchiostro} stroke={1.4} />
        </div>
      </div>
      <div className="sc">{children}</div>
    </div>);

}

/* ─── TAB BAR ─── */
function TabBar({ active = 'cal' }) {
  const T = useT();
  const accent = T.accent || C.terracotta;
  const tabs = [
  { id: 'cal', icon: 'calendar', label: 'Calendario' },
  { id: 'history', icon: 'wave', label: 'Archivio' },
  { id: 'stats', icon: 'chart', label: 'Statistiche' },
  { id: 'settings', icon: 'settings', label: 'Impostazioni' }];

  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0, height: 84,
      background: 'rgba(244,237,226,0.96)', backdropFilter: 'blur(16px)',
      borderTop: '1px solid rgba(43,37,33,0.08)',
      display: 'flex', alignItems: 'flex-start', paddingTop: 10
    }}>
      {tabs.map((t) => {
        const on = t.id === active;
        return (
          <div key={t.id} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3 }}>
            <Icon name={t.icon} size={24} color={on ? accent : 'rgba(43,37,33,0.3)'} stroke={on ? 2 : 1.5} />
            <span style={{ fontFamily: 'Inter', fontSize: 10, fontWeight: on ? 600 : 400, color: on ? accent : 'rgba(43,37,33,0.55)' }}>{t.label}</span>
          </div>);

      })}
    </div>);

}

/* ─── FLOW DOTS (cerchi flusso) ─── */
function FlowTypeChips({ value, onChange }) {
  const T = useT();
  const accent = T.accent || C.terracotta;
  const accentDark = T.accentDark || C.tc_scura;
  const types = [
    { id: 'assente',      label: 'Assente',      variant: 'neutral' },
    { id: 'mestruazioni', label: 'Mestruazioni', variant: 'flow'    },
    { id: 'spotting',     label: 'Spotting',     variant: 'spot'    },
  ];
  return (
    <div style={{ display: 'flex', gap: 8 }}>
      {types.map(t => {
        const sel = value === t.id;
        const bg = !sel ? 'rgba(43,37,33,0.04)' :
          t.variant === 'neutral' ? 'rgba(43,37,33,0.08)' :
          t.variant === 'flow'    ? accent + '22' : accent + '14';
        const border = !sel ? '1px solid rgba(43,37,33,0.1)' :
          t.variant === 'neutral' ? '1.5px dashed rgba(43,37,33,0.32)' :
          t.variant === 'flow'    ? `1.5px solid ${accent}BB` : `1.5px solid ${accent}66`;
        const textColor = !sel ? 'rgba(43,37,33,0.42)' :
          t.variant === 'neutral' ? C.inchiostro : accentDark;
        return (
          <div key={t.id} onClick={() => onChange(sel ? null : t.id)} style={{
            flex: 1, height: 44, borderRadius: 12,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: bg, border, cursor: 'pointer', transition: 'all 0.15s'
          }}>
            <span style={{ fontFamily: 'Inter', fontSize: 13, fontWeight: sel ? 500 : 400, color: textColor }}>{t.label}</span>
          </div>
        );
      })}
    </div>
  );
}
function FlowIntensityDots({ value, onChange }) {
  const T = useT();
  const accent = T.accent || C.terracotta;
  const accentDark = T.accentDark || C.tc_scura;
  const R = 18, bx = (R + 7) * 2, cx = bx / 2;
  const opts = [
    { id: 1, label: 'Leggero',    fillOp: 0.30 },
    { id: 2, label: 'Moderato',   fillOp: 0.65 },
    { id: 3, label: 'Abbondante', fillOp: 0.94 },
  ];
  return (
    <div style={{ display: 'flex', gap: 10, alignItems: 'center', justifyContent: 'center', paddingTop: 16, paddingBottom: 2 }}>
      {opts.map(opt => {
        const sel = value === opt.id;
        return (
          <div key={opt.id} onClick={() => onChange(sel ? null : opt.id)}
            style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7, cursor: 'pointer' }}>
            <svg width={bx} height={bx} viewBox={`0 0 ${bx} ${bx}`}>
              {sel && <circle cx={cx} cy={cx} r={R + 5} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.3" />}
              <circle cx={cx} cy={cx} r={R} fill={accent} fillOpacity={opt.fillOp} stroke={accent} strokeWidth="1.4" />
            </svg>
            <span style={{ fontFamily: 'Inter', fontSize: 10, color: sel ? accentDark : 'rgba(43,37,33,0.4)', fontWeight: sel ? 600 : 400 }}>{opt.label}</span>
          </div>
        );
      })}
    </div>
  );
}
/* ─── PAIN CIRCLES ─── */
function PainDots({ value = 0, onChange }) {
  const lav = C.malva;
  const levels = [
  { id: 0, label: 'Nessuno', fillOp: 0 },
  { id: 1, label: 'Lieve', fillOp: 0.28 },
  { id: 2, label: 'Moderato', fillOp: 0.6 },
  { id: 3, label: 'Intenso', fillOp: 0.92 }];
  const R = 18,boxSize = (R + 7) * 2,cx = boxSize / 2;

  return (
    <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
      {levels.map((lv) => {
        const sel = value === lv.id;
        return (
          <div key={lv.id} onClick={() => onChange && onChange(value === lv.id ? null : lv.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
            <svg width={boxSize} height={boxSize} viewBox={`0 0 ${boxSize} ${boxSize}`}>
              {sel && <circle cx={cx} cy={cx} r={R + 5} stroke={lav} strokeWidth="1.2" fill="none" opacity="0.28" />}
              <circle cx={cx} cy={cx} r={R} stroke={lav} strokeWidth="1.5" fill={lav} fillOpacity={lv.fillOp} />
            </svg>
            <span style={{ fontFamily: 'Inter', fontSize: 10, color: sel ? lav : 'rgba(43,37,33,0.38)', fontWeight: sel ? 600 : 400 }}>{lv.label}</span>
          </div>);

      })}
    </div>);


}

/* ─── CHIP ─── */
function Chip({ label, selected, onToggle }) {
  const T = useT();
  const accent = T.accent || C.terracotta;
  return (
    <div
      onClick={onToggle}
      style={{
        display: 'inline-flex', alignItems: 'center',
        paddingInline: 14, height: 36,
        background: selected ? accent : 'rgba(43,37,33,0.07)',
        border: `1px solid ${selected ? 'transparent' : 'rgba(43,37,33,0.12)'}`,
        borderRadius: 18, cursor: 'pointer', transition: 'all 0.15s'
      }}>
      
      <span style={{ fontFamily: 'Inter', fontSize: 13, fontWeight: 500, color: selected ? C.sabbia : C.inchiostro }}>{label}</span>
    </div>);

}

/* ══════════════════════════════════════
   ONBOARDING 1 — MANIFESTO
══════════════════════════════════════ */
function ScreenOnboarding1() {
  const { fontDisplay: font = "'DM Serif Display', serif" } = useT();
  return (
    <Phone>
      <div style={{ height: '100%', background: C.sabbia, display: 'flex', flexDirection: 'column' }}>
        {/* App name hero */}
        <div style={{ flex: '0 0 340px', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse 90% 60% at 50% 30%, rgba(200,116,86,0.05) 0%, transparent 80%)' }} />
          <div style={{ position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0 }}>
            {/* Alone terracotta */}
            <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', width: 220, height: 220, borderRadius: '50%', background: 'radial-gradient(ellipse, rgba(200,116,86,0.12) 0%, transparent 70%)', pointerEvents: 'none' }} />
            <div style={{ fontFamily: font, fontSize: 56, color: C.inchiostro, letterSpacing: '-0.02em', whiteSpace: 'nowrap', position: 'relative' }}>Mētra</div>
          </div>
        </div>

        {/* Text */}
        <div style={{ flex: 1, padding: '0 36px 28px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontFamily: font, fontSize: 34, color: C.inchiostro, lineHeight: 1.2, marginBottom: 14 }}>
              Il tuo ritmo,<br />custodito.
            </div>
            <div style={{ fontFamily: 'Inter', fontSize: 16, color: 'rgba(43,37,33,0.58)', lineHeight: 1.6 }}>Métra è un quaderno silenzioso per conoscerti, ciclo dopo ciclo.<br/><br/>Tutto rimane sul tuo telefono: nessun account, nessun cloud richiesto.</div>
          </div>

          {/* Macron + three dots */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, marginBottom: 24 }}>
            <svg width="48" height="22" viewBox="0 0 48 22">
              <line x1="6" y1="4" x2="42" y2="4" stroke={C.terracotta} strokeWidth="4" strokeLinecap="round"/>
              <circle cx="12" cy="16" r="3" fill={C.terracotta} fillOpacity="0.4"/>
              <circle cx="24" cy="16" r="3" fill={C.terracotta} fillOpacity="0.65"/>
              <circle cx="36" cy="16" r="3" fill={C.terracotta} fillOpacity="0.4"/>
            </svg>
          </div>

          {/* CTA */}
          <div style={{
            height: 56, background: C.inchiostro, borderRadius: 16,
            display: 'flex', alignItems: 'center', justifyContent: 'center'
          }}>
            <span style={{ fontFamily: 'Inter', fontSize: 16, fontWeight: 500, color: C.sabbia }}>Inizia</span>
          </div>

        </div>
      </div>
    </Phone>);

}

/* ══════════════════════════════════════
   ONBOARDING 2 — PRIVACY
══════════════════════════════════════ */
function ScreenOnboarding2() {
  const { fontDisplay: font = "'DM Serif Display', serif" } = useT();
  const [checks, setChecks] = useState([true, false, true]);
  const items = [
  { icon: 'lock', title: 'Solo sul tuo dispositivo', sub: 'I tuoi dati non lasciano mai il telefono, a meno che tu non scelga il backup.' },
  { icon: 'cloud', title: 'Backup opzionale cifrato', sub: 'Se abiliti il backup, i dati viaggiano solo cifrati end-to-end.' },
  { icon: 'export', title: 'Esporta sempre tutto', sub: 'I tuoi dati sono tuoi. Esporta in CSV o PDF in qualsiasi momento.' }];

  return (
    <Phone>
      <div style={{ height: '100%', background: C.sabbia, padding: '24px 28px', display: 'flex', flexDirection: 'column', gap: 0 }}>
        {/* Progress */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
          {[1, 2, 3].map((i) => <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= 2 ? C.terracotta : 'rgba(43,37,33,0.12)' }} />)}
        </div>

const DAYS = ['L', 'M', 'M', 'G', 'V', 'S', 'D'];
const MONTH_DATA = (() => {
  // April 2025: starts Tuesday (offset 1)
  const offset = 1;
  const total = 30;
  const flow = [10, 11, 12, 13, 14]; // period days
  const pred = [7, 8, 9, 10, 11]; // 5-day predicted period window
  const symptoms = [13, 16, 17];   // day 13: flow+symptom+pain; 16-17: symptom only or +pain
  const pain = [11, 12, 13, 16];   // day 11-12: flow+pain; 13: flow+symptom+pain; 16: symptom+pain
  const flowByDay = { 10: 'Abbondante', 11: 'Abbondante', 12: 'Moderato', 13: 'Leggero', 14: 'Leggero' };
  const symptomsByDay = { 13: ['Crampi', 'Stanchezza'], 16: ['Mal di testa'], 17: ['Stanchezza'] };
  const painByDay = { 11: 'Moderato', 12: 'Moderato', 13: 'Forte', 16: 'Lieve' };
  const notesByDay = { 13: 'Ciclo molto doloroso oggi', 16: 'Emicrania intensa' };
  return { offset, total, flow, pred, symptoms, pain, flowByDay, symptomsByDay, painByDay, notesByDay };
})();

function CalDay({ day, offset, monthData, selected, onSelect }) {
  if (!day) return <div style={{ width: 48, height: 48 }} />;
  const { flow, pred, symptoms, pain = [] } = monthData;
  const isFlow = flow.includes(day);
  const isPred = pred.includes(day);
  const hasSymptom = symptoms.includes(day);
  const hasPain = pain.includes(day);
  const isSel = selected === day;
  const ic = isSel ? C.sabbia : null;
  const indicators = [
    isFlow       && { name: 'drop',          color: ic || C.tc_scura },
    isPred       && { name: 'drop_outline',  color: ic || C.lavanda  },
    hasSymptom   && { name: 'star_small',    color: ic || C.ocra     },
    hasPain      && { name: 'zap',           color: ic || C.malva    },
  ].filter(Boolean);
  return (
    <div
      onClick={() => onSelect(day)}
      style={{
        width: 48, height: 48,
        borderRadius: 12,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1,
        background: isSel ? C.inchiostro : isFlow ? `${C.terracotta}22` : 'transparent',
        border: isSel ? 'none' : isFlow ? `1px solid ${C.terracotta}44` : isPred ? `1.5px solid ${C.lavanda}66` : '1px solid transparent',
        cursor: 'pointer'
      }}>
      <span style={{ fontFamily: 'Inter', fontSize: 15, fontWeight: isSel ? 600 : 400, color: isSel ? C.sabbia : C.inchiostro }}>{day}</span>
      {indicators.length > 0 && (
        <div style={{ display: 'flex', gap: 2, alignItems: 'center' }}>
          {indicators.map(ind => <DataIcon key={ind.name} name={ind.name} size={11} color={ind.color} />)}
        </div>
      )}
    </div>);

}

function ScreenRegistrazione() {
  const { fontDisplay: font = "'DM Serif Display', serif" } = useT();
  const [flowType, setFlowType] = useState('mestruazioni');
  const [flowIntensity, setFlowIntensity] = useState(2);
  const [pain, setPain] = useState(null);
  const [symptoms, setSymptoms] = useState(new Set(['Crampi']));
  const lastMensIntensityRef = React.useRef(2);
  const handleFlowType = t => {
    const next = t === flowType ? null : t;
    if (next === 'mestruazioni') {
      setFlowIntensity(lastMensIntensityRef.current);
    } else {
      if (flowIntensity !== null) lastMensIntensityRef.current = flowIntensity;
      setFlowIntensity(null);
    }
    setFlowType(next);
  };
  const [customSymptoms, setCustomSymptoms] = useState([]);
  const [addingSymptom, setAddingSymptom] = useState(false);
  const [newSymptomText, setNewSymptomText] = useState('');
  const SYMPTOMS = ['Crampi', 'Mal di testa', 'Stanchezza', 'Mal di schiena', 'Nausea', 'Gonfiore', 'Tensione mammaria'];
  const allSymptoms = [...SYMPTOMS, ...customSymptoms];
  const toggleSym = (s) => setSymptoms((prev) => {
    const n = new Set(prev);
    n.has(s) ? n.delete(s) : n.add(s);
    return n;
  });
  const confirmNewSymptom = () => {
    const trimmed = newSymptomText.trim();
    if (trimmed && !allSymptoms.includes(trimmed)) {
      setCustomSymptoms((p) => [...p, trimmed]);
      setSymptoms((prev) => new Set([...prev, trimmed]));
    }
    setNewSymptomText('');
    setAddingSymptom(false);
  };
  return (
    <Phone>
      <div style={{ height: '100%', background: C.sabbia, overflowY: 'auto', paddingBottom: 100 }}>
        {/* Header */}
        <div style={{ padding: '12px 24px 16px' }}>
          <div style={{ fontFamily: 'Inter', fontSize: 13, color: 'rgba(43,37,33,0.68)', marginBottom: 2 }}>Mercoledì 23 aprile</div>
          <div style={{ fontFamily: font, fontSize: 26, color: C.inchiostro }}>Come stai oggi?</div>
        </div>

        {/* Sections */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>

          {/* Flusso */}
          <div style={{ background: C.surface, borderTop: '1px solid rgba(43,37,33,0.07)', borderBottom: '1px solid rgba(43,37,33,0.07)', padding: '18px 24px' }}>
            <div style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'rgba(43,37,33,0.4)', marginBottom: 14 }}>Flusso</div>
            <FlowTypeChips value={flowType} onChange={handleFlowType} />
            {flowType === 'mestruazioni' && (
              <FlowIntensityDots value={flowIntensity} onChange={setFlowIntensity} />
            )}
            {flowType === 'spotting' && (
              <div style={{ marginTop: 14, padding: '11px 14px', borderRadius: 10, background: `${C.terracotta}0D`, border: `1px solid ${C.terracotta}28` }}>
                <span style={{ fontFamily: 'Inter', fontSize: 12, color: 'rgba(43,37,33,0.65)', lineHeight: 1.55 }}>Piccola perdita fuori dal flusso mestruale. Non è necessariamente l'inizio del ciclo.</span>
              </div>
            )}
            {flowType === 'assente' && (
              <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 8 }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-9" stroke="rgba(43,37,33,0.35)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                <span style={{ fontFamily: 'Inter', fontSize: 12, color: 'rgba(43,37,33,0.45)' }}>Nessun flusso oggi</span>
              </div>
            )}
          </div>

          {/* Dolore */}
          <div style={{ background: C.surface, borderBottom: '1px solid rgba(43,37,33,0.07)', padding: '18px 24px' }}>
            <div style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'rgba(43,37,33,0.4)', marginBottom: 14 }}>Intensità dolore</div>
            <PainDots value={pain} onChange={setPain} />
          </div>

          {/* Sintomi */}
          <div style={{ background: C.surface, borderBottom: '1px solid rgba(43,37,33,0.07)', padding: '18px 24px' }}>
            <div style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'rgba(43,37,33,0.4)', marginBottom: 14 }}>Sintomi</div>

    </div>);

}

/* ─── ROOT WITH TWEAKS ─── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "terracotta",
  "voce": "romantico",
  "respiro": 1.0
} /*EDITMODE-END*/;

function AppRoot() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <TweaksProvider palette={tweaks.palette} voce={tweaks.voce} respiro={tweaks.respiro}>
      <App />
      <TweaksPanel title="Métra — Forma & Voce">
        <TweakSection label="Tono cromatico">
          <TweakRadio
            id="palette"
            value={tweaks.palette}
            onChange={(v) => setTweak('palette', v)}
            options={[
            { value: 'terracotta', label: 'Terracotta — caldo, organico' },
            { value: 'lavanda', label: 'Lavanda — quieto, lunare' },
            { value: 'pietra', label: 'Pietra — minimale, editoriale' }]
            } />
          
        </TweakSection>
        <TweakSection label="Voce tipografica">
          <TweakRadio
            id="voce"
            value={tweaks.voce}
            onChange={(v) => setTweak('voce', v)}
            options={[
            { value: 'romantico', label: 'Romantico — DM Serif Display' },
            { value: 'netto', label: 'Netto — Inter, tutto sans' },
            { value: 'editoriale', label: 'Editoriale — Cormorant Garamond' }]
            } />
          
        </TweakSection>
        <TweakSection label="Respiro spaziale">
          <TweakSlider
            id="respiro"
            label="Densità"
            value={tweaks.respiro}
            onChange={(v) => setTweak('respiro', v)}
            min={0.7} max={1.4} step={0.05} />
          
        </TweakSection>
      </TweaksPanel>
    </TweaksProvider>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);
</script>
</body>
</html>
