<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Métra — Design System · Canone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #E8DFD0; color: #2B2521; }
.ds-wrap { max-width: 1440px; margin: 0 auto; padding: 56px 40px 120px; }
.ds-sec { margin-bottom: 72px; }
.ds-sec-hdr { display: flex; align-items: baseline; gap: 14px; margin-bottom: 28px; padding-bottom: 10px; border-bottom: 1.5px solid rgba(43,37,33,0.14); }
.ds-sec-num { font-family: 'DM Serif Display', serif; font-size: 13px; color: #C87456; letter-spacing: 0.08em; }
.ds-sec-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: #2B2521; }
.ds-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
.tlabel { font-family: 'Inter'; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(43,37,33,0.55); margin-bottom: 8px; }
.pair { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.lp { background: #FAF5EE; border-radius: 20px; padding: 28px; border: 1px solid rgba(43,37,33,0.08); }
.dp { background: #251D18; border-radius: 20px; padding: 28px; border: 1px solid rgba(237,228,211,0.07); }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ─── DESIGN TOKENS ─────────────────────────────────────────────
   Source of truth — mirrors metra-screens-light.html (L)
   and metra-screens-dark.html (D) exactly.
   Canonical names in screen files shown in comments.
──────────────────────────────────────────────────────────────── */
const L = {
  bg:       '#F4EDE2',  // C.sabbia
  surface:  '#FAF5EE',  // C.surface
  surface2: '#FDFAF6',  // C.bianco
  accent:   '#C87456',  // C.terracotta
  accentDk: '#9A4D32',  // C.tc_scura — body text on tinted bg, AA body
  ocra:     '#D4A26A',  // C.ocra
  lavanda:  '#5B4E7A',  // C.lavanda
  malva:    '#9E7488',  // C.malva
  muschio:  '#7A8471',  // C.muschio
  text:     '#2B2521',  // C.inchiostro
  sub:      'rgba(43,37,33,0.68)',
  faint:    'rgba(43,37,33,0.38)',
  border:   'rgba(43,37,33,0.08)',
  border2:  'rgba(43,37,33,0.12)',
};

const D = {
  bg:       '#1A1410',  // C.sabbia (dark) = notte
  surface:  '#251D18',  // C.surface (dark) = surface_d
  surface2: '#2F2520',  // C.bianco (dark) = surface2_d
  accent:   '#B86848',  // C.terracotta (dark) = tc_spenta
  accentDk: '#D88868',  // C.tc_scura (dark) = tc_chiara — AA body on tinted
  ocra:     '#C4956A',  // C.ocra (dark)
  lavanda:  '#9B8FBF',  // C.lavanda (dark) = lav_chiara
  malva:    '#C4A0B4',  // C.malva (dark) = malva_chiara
  muschio:  '#7A8471',  // C.muschio (same both themes)
  text:     '#EDE4D3',  // C.inchiostro (dark) = avorio
  sub:      'rgba(237,228,211,0.65)',
  faint:    'rgba(237,228,211,0.35)',
  border:   'rgba(237,228,211,0.08)',
  border2:  'rgba(237,228,211,0.14)',
};

/* ─── ICONS ─────────────────────────────────────────────────── */
function Icon({ name, size = 24, color, stroke = 1.5 }) {
  const c = color || L.text;
  const p = { stroke: c, strokeWidth: stroke, strokeLinecap: 'round', strokeLinejoin: 'round', fill: 'none' };
  const icons = {
    chevron_right: <path d="M9 6l6 6-6 6" {...p}/>,
    chevron_left:  <path d="M15 6l-6 6 6 6" {...p}/>,
    chevron_down:  <path d="M6 9l6 6 6-6" {...p}/>,
    x:             <path d="M18 6L6 18M6 6l12 12" {...p}/>,
    lock:          <><rect x="5" y="11" width="14" height="10" rx="2" {...p}/><path d="M8 11V7a4 4 0 0 1 8 0v4" {...p}/></>,
    cloud:         <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" {...p}/>,
    drop:          <path d="M12 3C12 3 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12-7-12z" {...p}/>,
    wave:          <path d="M3 12 Q6 9 9 12 Q12 15 15 12 Q18 9 21 12" {...p}/>,
    plus:          <><path d="M12 5v14M5 12h14" {...p}/></>,
    check:         <path d="M5 12l5 5 9-9" {...p}/>,
    settings:      <><circle cx="12" cy="12" r="3" {...p}/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" {...p}/></>,
    chart:         <><path d="M4 20h16" {...p}/><rect x="5" y="11" width="3" height="9" rx="1" {...p}/><rect x="10.5" y="7" width="3" height="13" rx="1" {...p}/><rect x="16" y="4" width="3" height="16" rx="1" {...p}/></>,
    calendar:      <><rect x="3" y="4" width="18" height="18" rx="2" {...p}/><path d="M16 2v4M8 2v4M3 10h18" {...p}/></>,
    note:          <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" {...p}/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z" {...p}/></>,
    wifi:          <><path d="M5 12.55a11 11 0 0 1 14.08 0" {...p}/><path d="M1.42 9a16 16 0 0 1 21.16 0" {...p}/><path d="M8.53 16.11a6 6 0 0 1 6.95 0" {...p}/><circle cx="12" cy="20" r="1" fill={c} stroke="none"/></>,
    battery:       <><rect x="1" y="6" width="18" height="12" rx="2" {...p}/><path d="M23 13v-2" {...p}/><rect x="3" y="8" width="12" height="8" rx="1" fill={c} stroke="none" fillOpacity="0.55"/></>,
    info:          <><circle cx="12" cy="12" r="9" {...p}/><path d="M12 8v1M12 12v4" {...p}/></>,
    leaf:          <path d="M5 19C5 12 8 5 19 5c0 11-7 14-14 14z" {...p}/>,
    export:        <><path d="M12 16V4M8 8l4-4 4 4" {...p}/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2" {...p}/></>,
    moon_crescent: <path d="M12 3a9 9 0 1 0 9 9 6.5 6.5 0 0 1-9-9z" {...p}/>,
    star_small:    <path d="M12 3L14 9.2L20.6 9.2L15.3 13.1L17.3 19.3L12 15.4L6.7 19.3L8.7 13.1L3.4 9.2L10 9.2Z" {...p}/>,
    today_fold:    <><path d="M5 5 L15 5 L19 9 L19 19 L5 19 Z" {...p}/><path d="M15 5 L19 5 L19 9 Z" {...p}/><rect x="10.5" y="11" width="3" height="3" rx="0.8" fill={c} stroke="none"/></>,
    filter:        <path d="M22 3H2l8 9.46V19l4 2v-8.54z" {...p}/>,
    pen:           <path d="M13 2 C19 5 19 14 13 19 L10 22 L11 19 C8 14 9 6 13 2 Z" fill={c} stroke="none" />,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none">{icons[name] ?? <circle cx="12" cy="12" r="9" stroke={c} strokeWidth={stroke}/>}</svg>;
}

function DataIcon({ name, size = 12, color }) {
  const paths = {
    drop:         <path d="M12 3C12 3 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12-7-12z" fill={color}/>,
    drop_outline: <path d="M12 3C12 3 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12-7-12z" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>,
    moon_crescent:<path d="M12 3a9 9 0 1 0 9 9 6.5 6.5 0 0 1-9-9z" fill={color}/>,
    star_small:   <path d="M12 3L14 9.2L20.6 9.2L15.3 13.1L17.3 19.3L12 15.4L6.7 19.3L8.7 13.1L3.4 9.2L10 9.2Z" fill={color}/>,
    zap:          <path d="M13 3L5 14L11 14L9 21L19 11L13 11Z" fill={color}/>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">{paths[name] ?? null}</svg>;
}

function Moon({ phase = 2, size = 24, color }) {
  const c = color || L.text;
  const fills = [
    [],
    [<path key="a" d="M12 3a9 9 0 0 0 0 18 6 6 0 0 1 0-18z" fill={c} fillOpacity="0.8"/>],
    [<path key="a" d="M12 3v18a9 9 0 0 0 0-18z" fill={c} fillOpacity="0.8"/>],
    [<path key="a" d="M12 3a9 9 0 0 1 0 18 4 4 0 0 0 0-18z" fill={c} fillOpacity="0.8"/>],
    [<circle key="a" cx="12" cy="12" r="9" fill={c} fillOpacity="0.8"/>],
  ];
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.3"/>
      {fills[Math.min(phase, 4)]}
    </svg>
  );
}

/* ─── DS SHELL ───────────────────────────────────────────────── */
function Sec({ num, title, children }) {
  return (
    <div className="ds-sec">
      <div className="ds-sec-hdr">
        <span className="ds-sec-num">{String(num).padStart(2,'0')}</span>
        <span className="ds-sec-title">{title}</span>
      </div>
      {children}
    </div>
  );
}

function Swatch({ hex, name, role, dark }) {
  const isLight = (() => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return (r*299+g*587+b*114)/1000 > 140; })();
  const onSw = isLight ? '#2B2521' : '#EDE4D3';
  return (
    <div style={{ width: 148, flexShrink: 0 }}>
      <div style={{ width: 148, height: 84, background: hex, borderRadius: 10, border: `1px solid ${dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)'}`, display: 'flex', alignItems: 'flex-end', padding: '7px 9px', marginBottom: 7 }}>
        <span style={{ fontFamily: 'Inter', fontSize: 11, fontWeight: 600, color: onSw, opacity: 0.85, fontVariantNumeric: 'tabular-nums' }}>{hex}</span>
      </div>
      <div style={{ fontFamily: 'Inter', fontSize: 13, fontWeight: 600, color: dark ? D.text : L.text, marginBottom: 2 }}>{name}</div>
      <div style={{ fontFamily: 'Inter', fontSize: 11, color: dark ? D.sub : L.sub, lineHeight: 1.4 }}>{role}</div>
    </div>
  );
}

function CBadge({ ratio, label, dark }) {
  const pass = ratio >= 4.5, lg = ratio >= 3.0;
  const col = pass ? '#7A8471' : lg ? '#D4A26A' : '#C0392B';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 7 }}>
      <div style={{ width: 7, height: 7, borderRadius: '50%', background: col, flexShrink: 0 }}/>
      <span style={{ fontFamily: 'Inter', fontSize: 12, color: dark ? D.text : L.text }}>{label}: {ratio}:1</span>
      <span style={{ fontFamily: 'Inter', fontSize: 11, color: col, fontWeight: 600 }}>{pass ? 'AA' : lg ? 'AA Large' : 'FAIL'}</span>
    </div>
  );
}

/* ─── CANONICAL ATOMS (exact match to screen implementations) ─ */

function MetraToggle({ on, onChange, t = L }) {
  const trackOff = t === D ? 'rgba(237,228,211,0.10)' : 'rgba(43,37,33,0.08)';
  return (
    <div onClick={() => onChange(!on)} style={{ width: 48, height: 28, borderRadius: 14, background: on ? t.accent : trackOff, transition: 'background 0.15s', position: 'relative', cursor: 'pointer', flexShrink: 0 }}>
      <div style={{ position: 'absolute', top: 3, left: on ? 23 : 3, width: 22, height: 22, borderRadius: 11, background: t.surface, transition: 'left 0.15s' }}/>
    </div>
  );
}

function Chip({ label, selected, onToggle, t = L }) {
  const unselBg = t === D ? 'rgba(237,228,211,0.07)' : 'rgba(43,37,33,0.07)';
  return (
    <div onClick={onToggle} style={{ display: 'inline-flex', alignItems: 'center', paddingInline: 14, height: 36, background: selected ? t.accent : unselBg, border: `1px solid ${selected ? 'transparent' : t.border2}`, borderRadius: 18, cursor: 'pointer', transition: 'all 0.15s' }}>
      <span style={{ fontFamily: 'Inter', fontSize: 13, fontWeight: 500, color: selected ? t.bg : t.text }}>{label}</span>
    </div>
  );
}

function FlowTypeChips({ value, onChange, t = L }) {
  const neutral = t === D ? 'rgba(237,228,211,' : 'rgba(43,37,33,';
  const types = [
    { id: 'assente',      label: 'Assente',      variant: 'neutral' },
    { id: 'intensita',    label: 'Intensità',    variant: 'flow'    },
    { id: 'spotting',     label: 'Spotting',     variant: 'spot'    },
  ];
  return (
    <div style={{ display: 'flex', gap: 8 }}>
      {types.map(tp => {
        const sel = value === tp.id;
        const bg = !sel ? neutral+'0.04)' : tp.variant==='neutral' ? neutral+'0.08)' : tp.variant==='flow' ? t.accent+'22' : t.accent+'14';
        const border = !sel ? `1px solid ${neutral}0.1)` : tp.variant==='neutral' ? `1.5px dashed ${neutral}0.32)` : tp.variant==='flow' ? `1.5px solid ${t.accent}BB` : `1.5px solid ${t.accent}66`;
        const tc = !sel ? neutral+'0.42)' : tp.variant==='neutral' ? t.text : t.accentDk;
        return (
          <div key={tp.id} onClick={() => onChange(sel ? null : tp.id)} style={{ flex: 1, height: 44, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', background: bg, border, cursor: 'pointer', transition: 'all 0.15s' }}>
            <span style={{ fontFamily: 'Inter', fontSize: 13, fontWeight: sel ? 500 : 400, color: tc }}>{tp.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function FlowIntensityDots({ value, onChange, t = L }) {
  const R = 18, bx = (R+7)*2, cx = bx/2;
  const opts = [{ id:1, label:'Leggero', fillOp:0.30 }, { id:2, label:'Moderato', fillOp:0.65 }, { id:3, label:'Abbondante', fillOp:0.94 }];
  const faint = t === D ? 'rgba(237,228,211,0.4)' : 'rgba(43,37,33,0.4)';
  return (
    <div style={{ display: 'flex', gap: 10, alignItems: 'center', justifyContent: 'center', paddingTop: 16, paddingBottom: 2 }}>
      {opts.map(opt => {
        const sel = value === opt.id;
        return (
          <div key={opt.id} onClick={() => onChange(sel ? null : opt.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7, cursor: 'pointer' }}>
            <svg width={bx} height={bx} viewBox={`0 0 ${bx} ${bx}`}>
              {sel && <circle cx={cx} cy={cx} r={R+5} fill="none" stroke={t.accent} strokeWidth="1.2" opacity="0.3"/>}
              <circle cx={cx} cy={cx} r={R} fill={t.accent} fillOpacity={opt.fillOp} stroke={t.accent} strokeWidth="1.4"/>
            </svg>
            <span style={{ fontFamily: 'Inter', fontSize: 10, color: sel ? t.accentDk : faint, fontWeight: sel ? 600 : 400 }}>{opt.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function PainDots({ value, onChange, t = L }) {
  const col = t.malva;
  const faint = t === D ? 'rgba(237,228,211,0.38)' : 'rgba(43,37,33,0.38)';
  const levels = [{ id:0, label:'Nessuno', fillOp:0 }, { id:1, label:'Lieve', fillOp:0.28 }, { id:2, label:'Moderato', fillOp:0.6 }, { id:3, label:'Intenso', fillOp:0.92 }];
  const R = 18, bx = (R+7)*2, cx = bx/2;
  return (
    <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
      {levels.map(lv => {
        const sel = value === lv.id;
        return (
          <div key={lv.id} onClick={() => onChange(sel ? null : lv.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
            <svg width={bx} height={bx} viewBox={`0 0 ${bx} ${bx}`}>
              {sel && <circle cx={cx} cy={cx} r={R+5} stroke={col} strokeWidth="1.2" fill="none" opacity="0.28"/>}
              <circle cx={cx} cy={cx} r={R} stroke={col} strokeWidth="1.5" fill={col} fillOpacity={lv.fillOp}/>
            </svg>
            <span style={{ fontFamily: 'Inter', fontSize: 10, color: sel ? col : faint, fontWeight: sel ? 600 : 400 }}>{lv.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// §8.3.1 Calendar day state table — Selected state tokens:
//   Light: bg inchiostro #2B2521 (t.text), text sabbia #F4EDE2 (t.bg), weight 600
//   Dark:  bg tc_spenta  #B86848 (D.accent), text notte #1A1410 (D.bg), weight 600
//   Indicators on selected cell use bgPrimary (t.bg) for contrast in both themes.
function CalDay({ day, monthData, selected, onSelect, t = L }) {
  if (!day) return <div style={{ width: 48, height: 48 }}/>;
  const { flow, pred, symptoms=[], pain=[], notesByDay={} } = monthData;
  const isFlow = flow.includes(day), isPred = pred.includes(day), hasS = symptoms.includes(day), hasP = pain.includes(day);
  const hasN = notesByDay[day] !== undefined;
  const isSel = selected === day;
  const ic = isSel ? t.bg : null;
  const penColor = t === D ? 'rgba(237,228,211,0.68)' : 'rgba(43,37,33,0.68)';
  const inds = [
    isFlow && { name:'drop',         color: ic || t.accentDk,    stroke: false },
    isPred && { name:'drop_outline', color: ic || t.lavanda,     stroke: false },
    hasS   && { name:'star_small',   color: ic || t.ocra,        stroke: false },
    hasP   && { name:'zap',          color: ic || t.malva,       stroke: false },
    hasN   && { name:'pen',          color: ic || penColor,      stroke: true  },
  ].filter(Boolean);
  return (
    <div onClick={() => onSelect(day)} style={{ width:48, height:48, borderRadius:12, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:1, background: isSel ? (t === D ? t.accent : t.text) : isFlow ? `${t.accent}22` : 'transparent', border: isSel ? 'none' : isFlow ? `1px solid ${t.accent}44` : isPred ? `1.5px solid ${t.lavanda}66` : '1px solid transparent', cursor:'pointer' }}>
      <span style={{ fontFamily:'Inter', fontSize:15, fontWeight: isSel ? 600 : 400, color: isSel ? t.bg : t.text }}>{day}</span>
      {inds.length > 0 && <div style={{ display:'flex', gap: inds.length >= 4 ? 1 : 2, alignItems:'center' }}>{inds.map(ind => ind.stroke ? <Icon key={ind.name} name={ind.name} size={11} color={ind.color} stroke={1.5}/> : <DataIcon key={ind.name} name={ind.name} size={11} color={ind.color}/>)}</div>}
    </div>
  );
}

function SettingsRow({ label, value, toggle, destructive, t = L }) {
  const labelColor = destructive ? t.accentDk : t.text;
  const bg = destructive ? `${t.accent}0D` : 'transparent';
  return (
    <div style={{ height:56, paddingInline:20, display:'flex', alignItems:'center', justifyContent:'space-between', background:bg, cursor:'pointer' }}>
      <span style={{ fontFamily:'Inter', fontSize:15, fontWeight:500, color:labelColor, flex:1 }}>{label}</span>
      {toggle ? toggle : (
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          {value && <span style={{ fontFamily:'Inter', fontSize:14, color:t.sub }}>{value}</span>}
          {!destructive && <Icon name="chevron_right" size={16} color={t.sub}/>}
        </div>
      )}
    </div>
  );
}

function TabBar({ active = 'cal', t = L }) {
  const tabs = [{ id:'cal', icon:'calendar', label:'Calendario' }, { id:'history', icon:'wave', label:'Archivio' }, { id:'stats', icon:'chart', label:'Statistiche' }, { id:'settings', icon:'settings', label:'Impostazioni' }];
  const tabBg  = t === D ? 'rgba(26,20,16,0.96)'  : 'rgba(244,237,226,0.96)';
  const topB   = t === D ? 'rgba(237,228,211,0.08)' : 'rgba(43,37,33,0.08)';
  return (
    <div style={{ height:84, background:tabBg, backdropFilter:'blur(16px)', borderTop:`1px solid ${topB}`, display:'flex', alignItems:'flex-start', paddingTop:10 }}>
      {tabs.map(tb => {
        const on = tb.id === active;
        return (
          <div key={tb.id} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
            <Icon name={tb.icon} size={24} color={on ? t.accent : t.faint} stroke={on ? 2 : 1.5}/>
            <span style={{ fontFamily:'Inter', fontSize:10, fontWeight: on ? 600 : 400, color: on ? t.accent : t.faint }}>{tb.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ─── SECTIONS ───────────────────────────────────────────────── */

function S01_Palette() {
  return (
    <Sec num={1} title="Palette — Light & Dark">
      <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
        <div>
          <div className="tlabel" style={{ marginBottom:14 }}>Light</div>
          <div className="ds-row">
            {[
              [L.bg,      'Sabbia',        'Background phone · page'],
              [L.surface, 'Surface',       'Card · sezioni'],

    return (
      <div style={{ position:'relative', width:320, height:380, borderRadius:16, overflow:'hidden', background:overlayBg, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ background:dialogBg, borderRadius:12, width:288, boxShadow:'0 8px 32px rgba(43,37,33,0.18)', overflow:'hidden' }}>
          {/* Title */}
          <div style={{ padding:'20px 20px 0' }}>
            <div style={{ fontFamily:'DM Serif Display', fontSize:20, color:titleColor, marginBottom:8 }}>Scegli versione</div>
            <div style={{ fontFamily:'Inter', fontSize:14, color:bodyColor, lineHeight:1.5, marginBottom:12 }}>Seleziona il backup da ripristinare. L'operazione sostituirà tutti i dati presenti.</div>
          </div>
          {/* Divider */}
          <div style={{ height:1, background:dividerColor }}/>
          {/* Scrollable list */}
          <div style={{ maxHeight:160, overflowY:'auto' }}>
            {ENTRIES.map((e, i) => (
              <RadioRow key={e.name} entry={e} selected={sel} onSelect={setSel} t={t} dark={dark} first={i === 0}/>
            ))}
          </div>
          {/* Divider */}
          <div style={{ height:1, background:dividerColor }}/>
          {/* Action row */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 12px' }}>
            <button style={{ fontFamily:'Inter', fontSize:14, fontWeight:500, color:t.accent, background:'transparent', border:'none', cursor:'pointer', padding:'8px', borderRadius:8 }}>
              Usa più recente
            </button>
            <div style={{ display:'flex', gap:4 }}>
              <button style={{ fontFamily:'Inter', fontSize:14, fontWeight:500, color:cancelColor, background:'transparent', border:'none', cursor:'pointer', padding:'8px', borderRadius:8 }}>
                Annulla
              </button>
              <button style={{ fontFamily:'Inter', fontSize:14, fontWeight:600, color:errorColor, background:'transparent', border:'none', cursor:'pointer', padding:'8px', borderRadius:8 }}>
                Ripristina
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function DialogEmpty({ t, dark }) {
    const dialogBg = dark ? '#2F2520' : '#FDFAF6';
    const overlayBg = dark ? 'rgba(0,0,0,0.60)' : 'rgba(43,37,33,0.40)';
    const titleColor = t.text;
    const bodyColor = dark ? 'rgba(237,228,211,0.68)' : 'rgba(43,37,33,0.68)';
    const emptyColor = dark ? 'rgba(237,228,211,0.38)' : 'rgba(43,37,33,0.38)';
    const cancelColor = dark ? 'rgba(237,228,211,0.55)' : 'rgba(43,37,33,0.55)';
    const dividerColor = dark ? 'rgba(237,228,211,0.07)' : 'rgba(43,37,33,0.07)';
    return (
      <div style={{ position:'relative', width:320, height:280, borderRadius:16, overflow:'hidden', background:overlayBg, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ background:dialogBg, borderRadius:12, width:288, boxShadow:'0 8px 32px rgba(43,37,33,0.18)', overflow:'hidden' }}>
          {/* Title */}
          <div style={{ padding:'20px 20px 0' }}>
            <div style={{ fontFamily:'DM Serif Display', fontSize:20, color:titleColor, marginBottom:8 }}>Scegli versione</div>
          </div>
          {/* Divider */}
          <div style={{ height:1, background:dividerColor }}/>
          {/* Empty state — Semantics(liveRegion: true) target */}
          <div style={{ padding:'32px 20px', display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
            <Icon name="cloud" size={28} color={emptyColor} stroke={1.5}/>
            <span style={{ fontFamily:'Inter', fontSize:14, fontStyle:'italic', color:emptyColor, textAlign:'center', lineHeight:1.5 }}>Nessun backup trovato sul provider.</span>
          </div>
          {/* Divider */}
          <div style={{ height:1, background:dividerColor }}/>
          {/* Action row — empty state: close only */}
          <div style={{ display:'flex', justifyContent:'flex-end', padding:'8px 12px' }}>
            <button style={{ fontFamily:'Inter', fontSize:14, fontWeight:500, color:cancelColor, background:'transparent', border:'none', cursor:'pointer', padding:'8px', borderRadius:8 }}>
              Chiudi
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <Sec num={19} title="AlertDialog + RadioListTile — restore version picker">
      <div style={{ marginBottom:16, fontFamily:'Inter', fontSize:13, color:L.sub, lineHeight:1.65, maxWidth:640, padding:'12px 16px', background:`${L.accent}0D`, borderRadius:10, border:`1px solid ${L.accent}22` }}>
        <strong style={{ color:L.accentDk }}>HC-1 pattern — FR-14c.</strong> Il picker di versione usa <code style={{ fontFamily:'Inter', fontSize:12, background:'rgba(43,37,33,0.07)', padding:'1px 5px', borderRadius:4 }}>AlertDialog</code> + <code style={{ fontFamily:'Inter', fontSize:12, background:'rgba(43,37,33,0.07)', padding:'1px 5px', borderRadius:4 }}>RadioListTile</code>. Il bottom-sheet è <strong>escluso</strong> per questo pattern (§18.8). La riga di stato vuoto/errore richiede <code style={{ fontFamily:'Inter', fontSize:12, background:'rgba(43,37,33,0.07)', padding:'1px 5px', borderRadius:4 }}>Semantics(liveRegion: true)</code>.
      </div>
      <div style={{ display:'flex', gap:24, flexWrap:'wrap', alignItems:'flex-start' }}>
        <div>
          <div className="tlabel" style={{ marginBottom:12 }}>Light — versioni disponibili (3 righe, più recente pre-selezionata)</div>
          <div className="lp" style={{ padding:16 }}><DialogNormal t={L} dark={false}/></div>
        </div>
        <div>
          <div className="tlabel" style={{ marginBottom:12 }}>Dark — versioni disponibili</div>
          <div className="dp" style={{ padding:16 }}><DialogNormal t={D} dark/></div>
        </div>
        <div>
          <div className="tlabel" style={{ marginBottom:12 }}>Light — stato vuoto (nessun backup)</div>
          <div className="lp" style={{ padding:16 }}><DialogEmpty t={L} dark={false}/></div>
        </div>
        <div>
          <div className="tlabel" style={{ marginBottom:12 }}>Dark — stato vuoto</div>
          <div className="dp" style={{ padding:16 }}><DialogEmpty t={D} dark/></div>
        </div>
      </div>
      <div style={{ marginTop:20, fontFamily:'Inter', fontSize:12, color:L.sub, lineHeight:1.65, maxWidth:640 }}>
        <strong>Anatomia:</strong> (1) titolo DM Serif Display 20; (2) riga body Inter 14 sotto il titolo; (3) lista <code style={{ fontFamily:'Inter', fontSize:11, background:'rgba(43,37,33,0.07)', padding:'1px 4px', borderRadius:3 }}>RadioListTile</code> scrollabile max-h 160 px — ogni riga: radio 20 px · timestamp Inter 14/500 · badge "più recente" su prima voce · size Inter 12 sub; (4) pulsante shortcut <code style={{ fontFamily:'Inter', fontSize:11, background:'rgba(43,37,33,0.07)', padding:'1px 4px', borderRadius:3 }}>Usa più recente</code> a sinistra, colore terracotta; (5) CTA distruttiva <code style={{ fontFamily:'Inter', fontSize:11, background:'rgba(43,37,33,0.07)', padding:'1px 4px', borderRadius:3 }}>Ripristina</code> destra con <code style={{ fontFamily:'Inter', fontSize:11, background:'rgba(43,37,33,0.07)', padding:'1px 4px', borderRadius:3 }}>TextButton.styleFrom(foregroundColor: colorScheme.error)</code>.
      </div>
    </Sec>
  );
}

/* ─── APP ──────────────────────────────────────────────────── */
function App() {
  return (
    <div className="ds-wrap">
      <div style={{ marginBottom:64 }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:20, marginBottom:10 }}>
          <span style={{ fontFamily:'DM Serif Display', fontSize:36, color:L.text }}>Mētra</span>
          <span style={{ fontFamily:'Inter', fontSize:12, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:L.faint }}>Design System · Canone</span>
        </div>
        <p style={{ fontFamily:'Inter', fontSize:14, color:L.sub, maxWidth:660, lineHeight:1.65 }}>
          Fonte di verità per tutti i token, componenti e pattern di Métra — light e dark. I valori rispecchiano esattamente <code style={{ fontFamily:'Inter', fontSize:13, background:'rgba(43,37,33,0.07)', padding:'1px 5px', borderRadius:4 }}>metra-screens-light.html</code> e <code style={{ fontFamily:'Inter', fontSize:13, background:'rgba(43,37,33,0.07)', padding:'1px 5px', borderRadius:4 }}>metra-screens-dark.html</code>. Qualsiasi modifica al design va applicata prima alle schermate, poi a questo catalogo.
        </p>
      </div>

      <S01_Palette/>
      <S02_Tipografia/>
      <S03_Iconografia/>
      <S04_Bottoni/>
      <S05_Toggle/>
      <S06_Chip/>
      <S07_Segmented/>
      <S08_Input/>
      <S09_Flusso/>
      <S10_Dolore/>
      <S11_Calendario/>
      <S12_CardGiornata/>
      <S13_Statistiche/>
      <S14_Impostazioni/>
      <S15_TabBar/>
      <S16_Contrasto/>
      <S17_Spacing/>
      <S18_TokenRef/>
      <S19_RestorePicker/>

      <div style={{ borderTop:`1.5px solid rgba(43,37,33,0.12)`, paddingTop:32, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontFamily:'DM Serif Display', fontSize:20, color:L.text }}>Mētra</span>
        <span style={{ fontFamily:'Inter', fontSize:12, color:L.faint }}>Design System · Canone · GPL-3.0</span>
      </div>
    </div>
  );

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
