---
layout: default
---

<!-- Language-detection redirect -->
<script>
(function() {
  var lang = (navigator.language || navigator.userLanguage || 'it').slice(0, 2);
  var target = (lang === 'it') ? '/it/' : '/en/';
  var base = '{{ site.baseurl }}';
  window.location.replace(base + target);
})();
</script>
<noscript>
  <meta http-equiv="refresh" content="0;url={{ '/it/' | relative_url }}">
</noscript>
<div class="page-wrapper" style="padding:120px 24px;text-align:center;">
  <p><a href="{{ '/it/' | relative_url }}">Italiano</a> · <a href="{{ '/en/' | relative_url }}">English</a></p>
</div>
