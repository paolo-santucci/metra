<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'it' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="stylesheet" href="{{ 'assets/css/main.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <header class="site-header" text-align="center">
    <div class="site-header__inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        
      </a>
      <nav class="site-nav">
        {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>
          {{ item.title }}
        </a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span class="site-footer__copy">
        &copy; {{ 'now' | date: '%Y' }} {{ site.title }}
      </span>
      <div class="site-footer__links">
        {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}">GitHub</a>
        {% endif %}
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </div>
  </footer>

</body>
</html>
