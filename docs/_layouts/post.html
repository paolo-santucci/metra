---
layout: default
---

<div class="page-wrapper">
  <header class="page-header">
    {% if page.tags.first %}
    <p class="page-header__eyebrow">{{ page.tags | join: ' · ' }}</p>
    {% endif %}
    <h1 class="page-header__title">{{ page.title }}</h1>
    {% if page.excerpt %}
    <p class="page-header__subtitle">{{ page.excerpt | strip_html | truncate: 180 }}</p>
    {% endif %}
    <div class="page-header__meta">
      <span class="tag tag--terra">{{ page.date | date: "%d %B %Y" }}</span>
      {% if page.author %}
      <span style="font-size:13px;color:rgba(43,37,33,0.5);">di {{ page.author }}</span>
      {% endif %}
    </div>
  </header>

  <article class="post-layout">
    <div class="post-body">
      {{ content }}
    </div>
  </article>
</div>
