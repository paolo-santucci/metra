---
layout: default
---

<div class="page-wrapper">
  <header class="page-header">
    <h1 class="page-header__title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-header__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="post-layout">
    <div class="post-body">
      {{ content }}
    </div>
  </div>
</div>
