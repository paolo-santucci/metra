# Owned by the long-plan skill. update-status preserves verbatim.
long-plan:
  feature: |
    Extend Métra cloud backup beyond Dropbox to Google Drive (cross-platform,
    OAuth, drive.file scope, visible "Metra" folder) and iCloud (iOS/iPadOS
    only, icloud_storage plugin + container entitlement, hidden on Android),
    same rules as Dropbox (zero-knowledge AES-256-GCM + Argon2id, app-folder
    isolation, retention=3, 507 progressive-prune). Single active provider at
    a time (new activeProvider field; SyncProvider enum += googleDrive,iCloud);
    switching = confirm → revoke old token → connect new → fresh chain;
    passphrase REUSED across providers; old provider .enc files LEFT intact;
    existing Dropbox users unaffected (additive DB migration). UI: CupertinoPicker
    wheel in bottom sheet (both platforms) with Connect button, on empty view
    and reachable from connected view for switching. Language: follow-system
    fallback resolves Italian only for Italian system locale (incl. it-CH),
    English for every other language (update _effectiveLangCode + MaterialApp
    localeResolutionCallback); explicit Settings choice unaffected. Docs: new
    internal dev guide .claude/docs/guides/cloud-provider-setup.md (not on Jekyll
    site) for Google Drive + iCloud credential provisioning + Dropbox recap.
  slug: "cloud-backup-google-drive-icloud"
  auto: false
  request-type: feature
  paths:
    spec: ".claude/docs/specs/lp-20260624-cloud-backup-google-drive-icloud-spec.md"
    plan: ".claude/docs/plans/lp-20260624-cloud-backup-google-drive-icloud-plan.md"
    assess-dir: ".claude/docs/specs/lp-20260624-cloud-backup-google-drive-icloud-assessment"
  phases:
