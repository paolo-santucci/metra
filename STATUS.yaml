known-issues:
  - severity: critical
    description: "iOS cold-start black screen (backup configured) — open. rollback/rc10 (now == main) reverts the KGP-2 dep upgrade as candidate fix; still pending TestFlight device verification (rc20 build 320). Android ClassNotFoundException crash is FIXED."
    impact: high
    workaround: "Confirm iOS black screen gone on device before tagging v1.0.2 final."
  - severity: warning
    description: "Drift DB/SQLCipher tests need a native sqlite3 lib absent in the local distrobox; without the workaround they fail locally (CI ubuntu has the lib). The workaround DOES run them green locally."
    impact: low
    workaround: "mkdir -p /tmp/sqlitelib && ln -sf /usr/lib/x86_64-linux-gnu/libsqlite3.so.0 /tmp/sqlitelib/libsqlite3.so then run flutter test with LD_LIBRARY_PATH=/tmp/sqlitelib"
  - severity: warning
    description: "share_plus and package_info_plus still bundle KGP; share_plus 12.x has Kotlin K2 compilation bug; unblocks when file_picker 12.x is stable"
    impact: low
    workaround: "Accept KGP warnings on every build; auto-resolves when file_picker 12.x is stable"
  - severity: warning
    description: "save_daily_log_test.dart future date rejection — intermittent failure near Italian midnight UTC (timezone/DST boundary)"
    impact: medium
    workaround: null
  - severity: warning
    description: "iOS PermissionDenied vs PermissionBlocked indistinguishable via flutter_local_notifications v17 — both return PermissionBlocked"
    impact: low
    workaround: "Conservative UX: settings dialog always offered on iOS denial; slightly over-eager on first-time denials"
