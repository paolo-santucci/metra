# lefthook.yml — local Git hook configuration for Métra
#
# Requires lefthook system binary. Install on Fedora/Linux:
#   sudo dnf install lefthook          # Fedora 39+
#   # OR: curl -1sLf 'https://dl.cloudsmith.io/public/evilmartians/lefthook/setup.rpm.sh' | sudo bash && sudo dnf install lefthook
#
# Then activate hooks once per clone:
#   lefthook install
#
# Rewrites staged Dart files in-place and re-stages them, so the
# committed version always matches what `dart format` would produce.

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.dart"
      run: dart format {staged_files}
      stage_fixed: true
