# Labels used in this template:
#   accessibility — applied automatically by this form
#   needs-triage  — applied automatically by this form

name: Accessibility issue
description: Report a barrier that makes Métra difficult or impossible to use with assistive technology
title: "[A11y]: "
labels:
  - accessibility
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Accessibility is a core requirement of Métra, not an optional extra. Every screen must be
        usable without sight, with motor assistance, and at any font size.

        Please describe the barrier you encountered as precisely as you can. Even partial information
        helps us reproduce and fix the problem.

  - type: textarea
    id: barrier
    attributes:
      label: Describe the barrier
      description: >-
        What is the accessibility problem? What were you trying to do, and what prevented you
        from completing the task?
      placeholder: "e.g. The 'Save' button has no accessible label, so TalkBack announces 'button' with no context."
    validations:
      required: true

  - type: dropdown
    id: assistive_technology
    attributes:
      label: Affected assistive technology
      description: Which assistive technology or accommodation is affected?
      options:
        - "Please select"
        - TalkBack (Android screen reader)
        - VoiceOver (iOS screen reader)
        - Dynamic Type / large text
        - Switch Access / external keyboard navigation
        - Other
    validations:
      required: true

  - type: input
    id: other_at
    attributes:
      label: If "Other" — specify the assistive technology
      description: Fill in only if you selected "Other" above.
      placeholder: "e.g. Voice Control, Braille display, high-contrast mode"
    validations:
      required: false

  - type: textarea
    id: screen_or_flow
    attributes:
      label: Screen or flow where the barrier occurs
      description: >-
        Name the screen, section, or user flow where you encountered the problem.
        Step-by-step navigation instructions help us reproduce it.
      placeholder: |
        e.g. Calendar screen → tap a day → "Log symptoms" bottom sheet →
        the symptom chips are not reachable via swipe navigation.
    validations:
      required: true

  - type: input
    id: wcag_criterion
    attributes:
      label: WCAG criterion (optional)
      description: >-
        If you know the relevant WCAG 2.2 success criterion, enter it here (e.g. "1.1.1 Non-text Content",
        "2.5.3 Label in Name"). Leave blank if unsure.
      placeholder: "e.g. 4.1.2 Name, Role, Value"
    validations:
      required: false

  - type: input
    id: platform
    attributes:
      label: Platform and OS version
      description: "e.g. Android 14 — Pixel 8 / iOS 17.4 — iPhone 15 Pro"
      placeholder: "e.g. Android 14 / iOS 17.4"
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      description: The Métra version shown in Settings → About.
      placeholder: "e.g. 0.3.0 (build 42)"
    validations:
      required: true
