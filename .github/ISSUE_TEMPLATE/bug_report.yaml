# Labels used in this template:
#   bug        — applied automatically by this form
#   needs-triage — applied automatically by this form
#   android    — applied manually during triage based on platform dropdown response
#   ios        — applied manually during triage based on platform dropdown response

name: Bug report
description: Report a reproducible problem in Mētra
title: "[Bug] "
labels:
  - bug
  - needs-triage
projects:
  - paolo-santucci/2
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.

        **Privacy reminder:** Mētra stores sensitive health data locally. Before submitting, review any
        logs or screenshots you attach and redact any personal information (cycle dates, health notes, etc.).

        If you believe you have found a **security vulnerability**, do not file a public issue.
        Use the private disclosure link in the issue picker instead.

  - type: checkboxes
    id: platform
    attributes:
      label: 📱 Platform
      description: Which platform(s) are affected?
      options:
        - label: Android
        - label: iOS
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: 🧭 Affected Area
      description: Which area(s) are affected?
      options:
        - label: Backup / data consistency
        - label: UI / interaction
        - label: Import / Export
        - label: Settings / preferences
        - label: Notifications / reminders
        - label: Prediction / calendar
        - label: Other
    validations:
      required: true
          
  - type: input
    id: app_version
    attributes:
      label: 💾 App version
      description: The Mētra version shown in Settings → About.
      placeholder: "e.g. 0.3.0 (build 42)"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: 📀 OS version
      description: Android version (e.g. Android 14) or iOS version (e.g. iOS 17.4).
      placeholder: "e.g. Android 14 / iOS 17.4"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: ☎️ Device model
      description: The device you are using (e.g. Pixel 8, iPhone 15 Pro).
      placeholder: "e.g. Pixel 8 / iPhone 15 Pro"
    validations:
      required: false          

  - type: dropdown
    id: impact
    attributes:
      label: 🚨 Impact
      description: How severe is the impact of this bug?
      options:
        - "Please select a severity level"
        - "Blocks core workflow"
        - "Data loss or data mismatch"
        - "Crash / freeze"
        - "Visual issue only"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happens and why it is unexpected.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 🔄 Steps to Reproduce
      description: Exact steps that reliably reproduce the issue.
      placeholder: |
        1. Open the app
        2. Navigate to …
        3. Tap …
        4. Observe …
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 🎯 Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: 🧨 Actual behavior
      description: What actually happened instead.
    validations:
      required: true

  - type: checkboxes
    id: regression
    attributes:
      label: 🧪 Regression?
      options:
        - label: This worked in a previous version

  - type: input
    id: device
    attributes:
      label: 🤔 Last known working version (if known)
      placeholder: "0.0.1"
    validations:
      required: false          

  - type: upload
    id: screenshots
    attributes:
      label: 📸 Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 📋 Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false

  - type: checkboxes
    id: not_security_issue
    attributes:
      label: Privacy and security confirmation
      options:
        - label: >-
            I confirm this is not a privacy or security vulnerability. Security issues must be
            reported privately via the contact link in the issue picker, not as public issues.
          required: true
