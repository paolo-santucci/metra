# Labels used in this template:
#   feature      — applied automatically by this form
#   needs-triage — applied automatically by this form

name: Feature request
description: Propose a new feature or improvement for Mētra
title: "[Feature] "
labels:
  - feature
  - needs-triage
projects:
  - paolo-santucci/2
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature for Mētra.

        Mētra is a **privacy-first, local-first** app — it has no proprietary server and collects
        zero telemetry. Please make sure your proposal respects these core principles before submitting.

        Features that require data to leave the device without user consent, or that introduce
        third-party analytics, will not be accepted.

  - type: checkboxes
    id: before_submitting
    attributes:
      label: ✅ Before submitting
      options:
        - label: I searched existing issues
          required: true
        - label: This is one request (not multiple unrelated features)
          required: true

  - type: checkboxes
    id: platform
    attributes:
      label: 📱 Taget Platform
      description: Which platform(s) should have this feature?
      options:
        - label: Android
        - label: iOS
    validations:
      required: true

  - type: checkboxes
    id: area
    validations:
      required: true
    attributes:
      label: 🧭 Area
      description: Which area(s) are interested?
      options:
        - label: Backup / data consistency
        - label: UI / interaction
        - label: Import / Export
        - label: Settings / preferences
        - label: Notifications / reminders
        - label: Prediction / calendar
        - label: Other

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Is your feature request related to a problem?
      description: >-
        Please describe the problem you are trying to solve.
      placeholder: "e.g. I want to … but currently I have to …"
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: 💡 Proposed Solution
      description: >-
        Describe the feature or change you would like to see. Be as specific as possible about
        behavior, UI placement, and any edge cases you have considered.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: >-
        Describe any alternative solutions or features you have considered, and why the proposed
        solution is preferable.
    validations:
      required: false

  - type: textarea
    id: additiona_context
    attributes:
      label: 🧩 Additional Context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false

  - type: checkboxes
    id: principles_confirmation
    attributes:
      label: Principle alignment
      options:
        - label: >-
            This feature respects the local-first and no-telemetry principles of Mētra. It does not
            require sending personal data to a proprietary server or to any third-party analytics service.
          required: true
