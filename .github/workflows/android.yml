name: Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: 'pub'

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --split-per-abi --debug --dart-define=DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}

      - name: Upload debug APKs
        uses: actions/upload-artifact@v6
        with:
          name: debug-apks
          path: build/app/outputs/flutter-apk/*-debug.apk

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/metra-release.keystore

      - name: Write key.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=metra-release.keystore
          EOF

      - name: Build release APK
        run: flutter build apk --split-per-abi --release --dart-define=DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}

      - name: Upload release APKs
        uses: actions/upload-artifact@v6
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*-release.apk
