name: Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: 'pub'

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --split-per-abi --debug --dart-define=DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}

      - name: Rename debug APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in *-debug.apk; do
            mv "$f" "${f/app-/com.paolosantucci.metraapp-}"
          done

      - name: Upload debug APKs
        uses: actions/upload-artifact@v6
        with:
          name: debug-apks
          path: build/app/outputs/flutter-apk/com.paolosantucci.metraapp-*-debug.apk

      # Signing steps only run when KEYSTORE_BASE64 secret is configured.
      # On forks or before the secret is set, these steps are skipped and
      # the release build falls back to debug signing (configured in build.gradle.kts).
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/metra-release.keystore

      - name: Write key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_PW: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        run: |
          {
            printf 'storePassword=%s\n' "$STORE_PW"
            printf 'keyPassword=%s\n'   "$KEY_PW"
            printf 'keyAlias=%s\n'      "$KEY_ALIAS"
            printf 'storeFile=metra-release.keystore\n'
          } > android/key.properties

      - name: Build release APK
        run: flutter build apk --split-per-abi --release --dart-define=DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}

      - name: Rename release APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in *-release.apk; do
            mv "$f" "${f/app-/com.paolosantucci.metraapp-}"
          done

      - name: Upload release APKs
        uses: actions/upload-artifact@v6
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/com.paolosantucci.metraapp-*-release.apk

      - name: Build release bundle (AAB)
        run: flutter build appbundle --release --dart-define=DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}

      - name: Rename release AAB
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/com.paolosantucci.metraapp-release.aab

      - name: Upload release AAB
        uses: actions/upload-artifact@v6
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/com.paolosantucci.metraapp-release.aab
