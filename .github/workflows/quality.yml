name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: 'pub'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting and codegen determinism
        run: |
          dart format .
          git diff --exit-code

      - name: Analyze
        run: flutter analyze

      - name: Check license headers
        run: bash tools/check_license_headers.sh

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Run tests with coverage
        run: flutter test --coverage --no-pub

      - name: Coverage gate (80% line coverage minimum)
        run: |
          # Strip generated files (Drift .g.dart, l10n) before measuring
          lcov --remove coverage/lcov.info \
            '*.g.dart' \
            '*/l10n/*' \
            -o coverage/lcov_filtered.info
          SUMMARY=$(lcov --summary coverage/lcov_filtered.info 2>&1)
          echo "$SUMMARY"
          # Extract the line coverage percentage (e.g. "85.3%")
          PCT=$(echo "$SUMMARY" | grep -E 'lines\.*:' | awk '{print $2}' | tr -d '%')
          if [ -z "$PCT" ]; then
            echo "ERROR: Could not parse line coverage from lcov --summary output."
            exit 1
          fi
          # Compare using awk (handles floats)
          PASS=$(awk -v pct="$PCT" 'BEGIN { print (pct >= 80) ? "yes" : "no" }')
          if [ "$PASS" != "yes" ]; then
            echo "FAILED: Line coverage ${PCT}% is below the 80% threshold."
            exit 1
          fi
          echo "OK: Line coverage ${PCT}% meets the 80% threshold."
