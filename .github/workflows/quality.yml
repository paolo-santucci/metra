name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the same Flutter version used in local development.
          # Floating '3.x' causes pubspec.lock drift whenever Flutter stable
          # bumps the Dart SDK, producing different transitive dep resolutions
          # between local and CI. Update this pin when upgrading Flutter locally,
          # then run `flutter pub get` and commit the updated pubspec.lock.
          flutter-version: '3.41.9'
          channel: stable
          cache: 'pub'

      - name: Install dependencies (enforce lock)
        # --enforce-lockfile fails fast with a clear error if pubspec.lock is
        # stale (e.g. after a transitive dep update). Fix: run `flutter pub get`
        # locally and commit the refreshed pubspec.lock.
        run: flutter pub get --enforce-lockfile

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting and codegen determinism
        run: |
          dart format .
          # Exclude pubspec.lock: lock-file freshness is enforced by the
          # "Install dependencies" step above. Only formatting and codegen
          # changes are checked here.
          git diff --exit-code -- . ':!pubspec.lock'

      - name: Analyze
        run: flutter analyze

      - name: Check license headers
        run: bash tools/check_license_headers.sh

      - name: Install lcov and sqlite3
        run: sudo apt-get update && sudo apt-get install -y lcov libsqlite3-dev

      - name: Run tests with coverage
        run: flutter test --coverage --no-pub

      - name: Coverage gate (80% line coverage minimum)
        run: |
          # Strip generated files (Drift .g.dart, l10n) before measuring
          lcov --remove coverage/lcov.info \
            '*.g.dart' \
            '*/l10n/*' \
            -o coverage/lcov_filtered.info
          SUMMARY=$(lcov --summary coverage/lcov_filtered.info 2>&1)
          echo "$SUMMARY"
          # Extract the line coverage percentage (e.g. "85.3%")
          PCT=$(echo "$SUMMARY" | grep -E 'lines\.*:' | awk '{print $2}' | tr -d '%')
          if [ -z "$PCT" ]; then
            echo "ERROR: Could not parse line coverage from lcov --summary output."
            exit 1
          fi
          # Compare using awk (handles floats)
          PASS=$(awk -v pct="$PCT" 'BEGIN { print (pct >= 80) ? "yes" : "no" }')
          if [ "$PASS" != "yes" ]; then
            echo "FAILED: Line coverage ${PCT}% is below the 80% threshold."
            exit 1
          fi
          echo "OK: Line coverage ${PCT}% meets the 80% threshold."
